<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fantasy Footy — NRL Edition (Unofficial)</title>
<style>
:root{
  --bg:#07070c; --bg2:#13131f; --card:#1a1a28; --card2:#161622; --line:#252535;
  --txt:#e8f0e8; --dim:#a8a8bc; --acc:#00e676; --acc2:#00b050; --red:#ff4d4d; --amber:#ffb700;
  --blue:#00b7ff; --violet:#8a3df0; --pink:#f472b6;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;font-size:14px}
/* ---- app shell layout ---- */
#app-shell{display:flex;min-height:100vh}
/* ---- sidebar (desktop) ---- */
#sidebar{width:218px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:18px 12px;position:sticky;top:0;height:100vh;overflow-y:auto}
.brand-row{display:flex;align-items:center;gap:11px;padding:0 4px 18px;border-bottom:1px solid var(--line);margin-bottom:14px}
.brand-ball{font-size:28px;line-height:1}
.brand-name{font-size:15px;font-weight:800;letter-spacing:.2px}
.brand-sub{font-size:9px;color:var(--dim);letter-spacing:1px;margin-top:2px;text-transform:uppercase}
#sidebar-nav{display:flex;flex-direction:column;gap:1px}
.navitem{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;color:var(--dim);font-size:13.5px;font-weight:600;cursor:pointer;transition:background .13s,color .13s;user-select:none}
.navitem:hover{color:var(--txt);background:rgba(255,255,255,.06)}
.navitem.on{color:var(--bg);background:var(--acc)}
.ni{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.navsep{height:1px;background:var(--line);margin:8px 4px}
.navspacer{flex:1}
.prof-card{display:none;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border:1px solid var(--line);border-radius:10px;margin-top:10px;cursor:pointer}
.prof-card:hover{border-color:var(--acc)}
.prof-card .av-sm{width:32px;height:32px;border-radius:50%;background:var(--acc);color:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0}
.prof-card b{font-size:13px;font-weight:700;display:block;color:var(--txt)}
.prof-card span{font-size:11px;color:var(--dim)}
/* ---- main wrap ---- */
#main-wrap{flex:1;display:flex;flex-direction:column;min-width:0;overflow-x:hidden}
/* ---- topbar ---- */
#topbar{background:linear-gradient(90deg,#0d1a10,#132013 40%,#0e1729);border-bottom:1px solid var(--line);padding:0 20px;height:60px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:49;flex-shrink:0}
.topbar-brand{font-size:16px;font-weight:800;letter-spacing:.3px;display:none;margin-right:4px}
.topbar-brand .ball{color:var(--acc)}
.rd-pill{display:flex;align-items:center;gap:10px;margin-right:auto}
.rd-pill .pill{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:5px 14px;font-weight:700;font-size:14px}
main{padding:18px;max-width:1280px;margin:0 auto}
/* ---- bottom tab bar (mobile) ---- */
#bottom-tabbar{display:none;position:fixed;bottom:0;left:0;right:0;background:#0d0d15;border-top:1px solid var(--line);z-index:50;justify-content:space-around;padding:6px 0 10px}
.btab{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 8px;color:var(--dim);font-size:10px;font-weight:600;cursor:pointer;border-radius:8px;min-width:52px;letter-spacing:.2px;user-select:none}
.btab .bi{font-size:18px;line-height:1.3}
.btab.on{color:var(--acc)}
.btab:hover{color:var(--txt)}
/* ---- responsive ---- */
@media(max-width:768px){
  #sidebar{display:none}
  .topbar-brand{display:block}
  #bottom-tabbar{display:flex}
  #app-main{padding-bottom:80px}
}
.page{display:none}
.page.on{display:block}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px}
.card h3{font-size:15px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.card h3 .tag{font-size:10px;background:var(--card2);border:1px solid var(--line);padding:2px 8px;border-radius:10px;color:var(--dim);font-weight:500}
.row{display:flex;gap:14px;flex-wrap:wrap}
.row>.card{flex:1;min-width:300px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}}
button.btn{background:var(--acc);color:#0b1220;border:none;padding:9px 16px;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px}
button.btn:hover{background:var(--acc2)}
button.btn.sec{background:var(--card2);color:var(--txt);border:1px solid var(--line)}
button.btn.sec:hover{border-color:var(--acc)}
button.btn.danger{background:#7f1d1d;color:#fecaca}
button.btn:disabled{opacity:.4;cursor:not-allowed}
input,select{background:var(--bg2);border:1px solid var(--line);color:var(--txt);padding:8px 10px;border-radius:8px;font-size:13px;outline:none}
input:focus,select:focus{border-color:var(--acc)}
.statbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 16px;min-width:120px}
.stat .v{font-size:20px;font-weight:800;color:var(--acc2)}
.stat .l{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.stat.warn .v{color:var(--red)}
/* field */
.field{background:linear-gradient(180deg,#10301c,#0d2717 60%,#10301c);border:1px solid #1e4d2e;border-radius:14px;padding:16px 8px;position:relative;overflow:hidden}
.field:before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(180deg,transparent 0 56px,rgba(255,255,255,.035) 56px 112px)}
.frow{display:flex;justify-content:center;gap:10px;margin:8px 0;position:relative;flex-wrap:wrap}
.frow-label{text-align:center;color:#5e9b74;font-size:10px;letter-spacing:2px;font-weight:700;margin-top:6px}
.pcard{width:108px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:6px;text-align:center;cursor:pointer;position:relative;transition:transform .08s}
.pcard:hover{transform:translateY(-2px);border-color:var(--acc)}
.pcard.empty{background:rgba(20,31,51,.55);border-style:dashed;color:var(--dim);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:118px}
.pcard .nm{font-weight:700;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcard .meta{font-size:10px;color:var(--dim)}
.pcard .sc{font-size:15px;font-weight:800;color:var(--acc2)}
.pcard .sc.dnp{color:var(--red);font-size:10px}
.badge{position:absolute;top:-6px;right:-6px;background:var(--amber);color:#1c1400;font-size:10px;font-weight:800;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg)}
.badge.vc{background:var(--blue);color:#03222e}
.bench-zone{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:10px;margin-top:10px}
.bench-zone .ttl{font-size:11px;color:var(--dim);font-weight:700;letter-spacing:1px;margin-bottom:8px}
.bench-row{display:flex;gap:10px;flex-wrap:wrap}
/* tables */
table{width:100%;border-collapse:collapse;font-size:13px}
th{color:var(--dim);text-align:left;padding:7px 8px;border-bottom:1px solid var(--line);font-size:11px;text-transform:uppercase;letter-spacing:.4px;cursor:pointer;white-space:nowrap}
th:hover{color:var(--txt)}
td{padding:7px 8px;border-bottom:1px solid #1b2740;white-space:nowrap}
tr:hover td{background:rgba(0,230,118,.04)}
.posb{display:inline-block;font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px;background:var(--card2);border:1px solid var(--line);margin-right:3px}
.posb.hok{background:rgba(255,183,0,.13);color:#ffb700;border-color:rgba(255,183,0,.28)}
.posb.mid,.posb.edg{background:rgba(0,230,118,.09);color:#00e676;border-color:rgba(0,230,118,.22)}
.posb.hlf{background:rgba(138,61,240,.13);color:#c074ff;border-color:rgba(138,61,240,.28)}
.posb.ctr{background:rgba(255,122,26,.13);color:#ff7a1a;border-color:rgba(255,122,26,.28)}
.posb.wfb{background:rgba(0,183,255,.11);color:#00b7ff;border-color:rgba(0,183,255,.24)}
.clubb{display:inline-flex;align-items:center;gap:5px;font-weight:600}
.dot{width:10px;height:10px;border-radius:3px;display:inline-block}
.pos-filter{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.pos-filter button{background:var(--card2);border:1px solid var(--line);color:var(--dim);padding:5px 11px;border-radius:14px;cursor:pointer;font-size:12px;font-weight:600}
.pos-filter button.on{background:var(--acc);color:var(--bg);border-color:var(--acc)}
/* modal */
#modal-bg{position:fixed;inset:0;background:rgba(4,8,16,.75);display:none;z-index:100;align-items:center;justify-content:center;padding:16px}
#modal-bg.on{display:flex}
#modal{background:var(--card);border:1px solid var(--line);border-radius:14px;max-width:780px;width:100%;max-height:88vh;overflow-y:auto;padding:18px;position:relative}
.gamelog td,.gamelog th{padding:4px 6px;font-size:11.5px}
.gamelog tr.tot td{border-top:2px solid var(--line);font-weight:700;background:var(--card2)}
#modal .x{position:absolute;top:10px;right:14px;background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer}
/* misc */
.flex{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.spacer{flex:1}
.muted{color:var(--dim)}
.good{color:var(--acc2)} .bad{color:var(--red)} .warn{color:var(--amber)}
.capbar{height:10px;background:var(--bg2);border-radius:6px;overflow:hidden;border:1px solid var(--line)}
.capbar>div{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .3s}
.capbar.over>div{background:linear-gradient(90deg,#dc2626,#f87171)}
.match{background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:10px;cursor:pointer;margin-bottom:8px}
.match:hover{border-color:var(--acc)}
.match .teams{display:flex;align-items:center;justify-content:space-between;gap:8px}
.match .t{display:flex;align-items:center;gap:8px;font-weight:700;flex:1}
.match .t.away{justify-content:flex-end}
.match .score{font-size:17px;font-weight:800;min-width:70px;text-align:center}
.settings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.set-item{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:10px}
.set-item label{display:block;font-size:11px;color:var(--dim);margin-bottom:5px}
.set-item input{width:100%}
.draft-pick-log{max-height:280px;overflow-y:auto;font-size:12px}
.onclock{animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,230,118,.5)}50%{box-shadow:0 0 0 8px rgba(0,230,118,0)}}
.ladder-pos{font-weight:800;color:var(--dim);width:24px;display:inline-block}
.avatar-sm{border-radius:8px}
.tooltip{font-size:11px;color:var(--dim);margin-top:6px}
.tabs2{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tabs2 button{background:var(--card2);border:1px solid var(--line);color:var(--dim);padding:7px 14px;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px}
.tabs2 button.on{background:var(--acc);color:var(--bg);border-color:var(--acc)}
.notice{background:rgba(0,230,118,.07);border:1px solid rgba(0,230,118,.28);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px}
.notice.red{background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.35)}
footer{text-align:center;color:#4b5a76;font-size:11px;padding:20px}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--card2);border-radius:6px}
/* ---- login page ---- */
#login-page{position:fixed;inset:0;z-index:999;background:linear-gradient(160deg,#050e1c 0%,#0b1a10 50%,#070f1e 100%);display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.login-card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:36px 32px;width:100%;max-width:420px;box-shadow:0 24px 60px rgba(0,0,0,.6)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo .ball{font-size:52px;display:block;margin-bottom:10px}
.login-logo h2{font-size:22px;font-weight:800;letter-spacing:.3px}
.login-logo p{color:var(--dim);font-size:13px;margin-top:4px}
.login-divider{display:flex;align-items:center;gap:10px;margin:18px 0;color:var(--dim);font-size:12px}
.login-divider:before,.login-divider:after{content:'';flex:1;height:1px;background:var(--line)}
.login-btn{width:100%;padding:13px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;transition:border-color .15s,background .15s}
.login-btn.google{background:#fff;color:#1f1f1f;border-color:#dadce0}
.login-btn.google:hover{background:#f0f0f0}
.login-btn.alt{background:var(--card2);color:var(--txt)}
.login-btn.alt:hover{border-color:var(--acc)}
.login-sub{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:16px;margin-top:14px}
.login-sub label{display:block;font-size:12px;color:var(--dim);margin-bottom:6px}
.login-sub input{width:100%;margin-bottom:10px}
.login-sub .btn{width:100%;padding:11px}
/* ---- user avatar in header ---- */
.user-chip{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:5px 12px 5px 5px;cursor:pointer}
.user-chip:hover{border-color:var(--acc)}
.user-chip .av{width:28px;height:28px;border-radius:50%;background:var(--acc);color:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0}
.user-chip .un{font-size:13px;font-weight:600;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ---- HOME DASHBOARD ---- */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:16px}
.stat-tile{background:var(--card);border-radius:12px;padding:16px 18px;border:1px solid var(--line);display:flex;flex-direction:column;gap:4px}
.stat-tile .st-label{font-size:11px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.stat-tile .st-val{font-size:28px;font-weight:800;color:var(--txt);line-height:1.1}
.stat-tile .st-sub{font-size:11px;color:var(--dim)}
.news-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);align-items:flex-start}
.news-item:last-child{border-bottom:none}
.news-icon{font-size:20px;line-height:1;flex-shrink:0;margin-top:2px}
.news-body{flex:1}
.news-title{font-size:13px;font-weight:700;color:var(--txt);margin:0 0 2px}
.news-sub{font-size:11px;color:var(--dim)}
.watchlist-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line)}
.watchlist-row:last-child{border-bottom:none}
.wl-info{flex:1;min-width:0}
.wl-name{font-size:13px;font-weight:700}
.wl-meta{font-size:11px;color:var(--dim)}
.wl-badge{background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:2px 8px;font-size:12px;font-weight:700;color:var(--txt)}

/* ---- POSITION-COLOURED PLAYER CARDS ---- */
.pcard{position:relative}
.pcard.pos-hok{border-top:2px solid var(--amber)}
.pcard.pos-mid,.pcard.pos-edg{border-top:2px solid var(--acc)}
.pcard.pos-hlf{border-top:2px solid var(--violet)}
.pcard.pos-ctr{border-top:2px solid #ff7a1a}
.pcard.pos-wfb{border-top:2px solid var(--blue)}

/* ---- WATCHLIST STAR BUTTON ---- */
.watch-btn{position:absolute;top:3px;left:3px;background:none;border:none;color:transparent;font-size:13px;cursor:pointer;padding:0;line-height:1;z-index:2;transition:color .15s;text-shadow:0 0 0 var(--dim)}
.pcard:hover .watch-btn{color:var(--dim)}
.watch-btn.on{color:transparent;text-shadow:0 0 0 var(--amber)}
.watch-btn.on:hover{text-shadow:0 0 0 var(--amber)}

/* ---- PRICE DELTA ---- */
.pdelta-up{color:var(--acc);font-size:10px}
.pdelta-dn{color:var(--red);font-size:10px}
.grade{display:inline-block;font-size:9px;font-weight:800;padding:1px 4px;border-radius:4px;margin-left:3px;letter-spacing:.03em}
.grade-aplus{background:#00e676;color:#07070c}
.grade-a{background:#69f0ae;color:#07070c}
.grade-b{background:#ffc107;color:#07070c}
.grade-c{background:#ff9800;color:#07070c}
.grade-d{background:var(--red);color:#fff}
.pcard.locked{opacity:.7;cursor:not-allowed;border-color:var(--amber)!important}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ---- SHARE TEAM MODAL ---- */
.share-box{background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:12px;font-family:monospace;font-size:12px;white-space:pre;overflow-x:auto;max-height:320px;overflow-y:auto;color:var(--txt)}

/* ---- COMPARISON MODAL ---- */
.cmp-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:start}
.cmp-col{display:flex;flex-direction:column;gap:6px}
.cmp-stat{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;background:var(--card2);border-radius:6px;font-size:13px}
.cmp-stat-label{color:var(--dim);font-size:11px;font-weight:600;text-align:center;padding:4px;text-transform:uppercase;letter-spacing:.04em}
.cmp-win{color:var(--acc);font-weight:700}
.cmp-divider{display:flex;flex-direction:column;gap:6px;align-items:center;justify-content:center;color:var(--dim);font-size:11px;padding-top:26px}

/* ---- DRAFT TIMER ---- */
.draft-timer-bar{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 18px;display:flex;align-items:center;gap:14px;margin-bottom:12px}
.draft-timer-num{font-size:28px;font-weight:900;color:var(--acc);min-width:48px;text-align:center;font-variant-numeric:tabular-nums;transition:color .3s}
.draft-timer-num.urgent{color:var(--red);animation:pulse 1s infinite}
.draft-timer-label{font-size:12px;color:var(--dim);font-weight:600}
.draft-timer-bar progress{flex:1;height:6px;border-radius:3px;overflow:hidden}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ---- PRICE TRACKER ---- */
.price-hist-table{width:100%;border-collapse:collapse;font-size:12px}
.price-hist-table th{color:var(--dim);font-weight:600;padding:4px 8px;text-align:right;border-bottom:1px solid var(--line)}
.price-hist-table td{padding:4px 8px;text-align:right;border-bottom:1px solid #1a1a2a}
.price-hist-table td:first-child{text-align:left;font-weight:600;color:var(--txt)}

/* ---- PLANNED TRADES ---- */
.trade-plan-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--card2);border-radius:8px;border:1px solid var(--line);margin-bottom:6px}
.trade-plan-row .tp-out{color:var(--red)}
.trade-plan-row .tp-in{color:var(--acc)}

/* ---- MOBILE FIELD IMPROVEMENTS ---- */
@media(max-width:600px){
  .frow{gap:4px;flex-wrap:wrap;justify-content:center}
  .pcard{min-width:72px;max-width:84px;padding:7px 4px}
  .pcard .nm{font-size:11px}
  .pcard .meta{font-size:10px}
  .pcard .sc{font-size:14px}
  .bench-row{gap:4px}
}


/* ── MODE TABS ── */
.mode-tabs{display:flex;gap:2px;background:var(--bg2);border-radius:10px;padding:3px;margin-bottom:16px;border:1px solid var(--line);flex-wrap:wrap}
.mode-tabs button{flex:1;min-width:80px;padding:9px 10px;border-radius:7px;font-size:13px;font-weight:600;color:var(--dim);background:none;border:none;cursor:pointer;transition:background .13s,color .13s;white-space:nowrap}
.mode-tabs button.on{background:var(--acc);color:#07070c}
.mode-tabs button:hover:not(.on){background:rgba(255,255,255,.06);color:var(--txt)}
.mode-hdr{display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap;padding:2px 0}
.mode-hdr h1{margin:0 0 3px;font-size:20px}
.mode-hdr .msub{color:var(--dim);font-size:12px}
.mstat b{display:block;font-size:17px;font-weight:800;color:var(--txt)}
.mstat span{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.04em}
</style>
</head>
<body>
<div id="login-page" style="display:none">
  <div class="login-card">
    <div class="login-logo">
      <span class="ball">🏉</span>
      <h2>Fantasy Footy</h2>

function emptyLine(){
  const st={};for(const[pi,n]of FIELD_STRUCT)st[pi]=Array(n).fill(null);
  return {starters:st,bench:Array(BENCH_N).fill(null),res:Array(RES_N).fill(null),c:null,vc:null};
}
/* resize an existing lineup to the current layout; returns players that no longer fit */
function resizeLine(line){
  const overflow=[];
  for(const[pi,n]of FIELD_STRUCT){
    const arr=line.starters[pi]||[];
    while(arr.length>n){const p=arr.pop();if(p!=null)overflow.push(p)}
    while(arr.length<n)arr.push(null);
    line.starters[pi]=arr;
  }
  [['bench',BENCH_N],['res',RES_N]].forEach(([k,N])=>{
    line[k]=line[k]||[];
    while(line[k].length>N){const p=line[k].pop();if(p!=null)overflow.push(p)}
    while(line[k].length<N)line[k].push(null);
  });
  return overflow;
}
function seatInLine(line,pid){
  const p=PLAYERS[pid];
  for(const[pi,n]of FIELD_STRUCT){if(!p.pos.includes(pi))continue;
    const i=line.starters[pi].indexOf(null);if(i>=0){line.starters[pi][i]=pid;return true}}
  let i=line.bench.indexOf(null);if(i>=0){line.bench[i]=pid;return true}
  i=line.res.indexOf(null);if(i>=0){line.res[i]=pid;return true}
  return false;
}
/* apply a layout change to every existing team */
function applyLayoutToTeams(){
  /* classic: keep players where possible, refund the rest */
  const ov=resizeLine(S.classic.line);
  ov.forEach(pid=>{
    if(!seatInLine(S.classic.line,pid)){
      S.classic.squad=S.classic.squad.filter(x=>x!==pid);
      if(S.classic.bank!=null)S.classic.bank+=price(pid);
      if(S.classic.line.c===pid)S.classic.line.c=null;
      if(S.classic.line.vc===pid)S.classic.line.vc=null;
    }
  });
  if(S.league)S.league.teams.forEach(t=>{if(!t.ai)return;resizeLine(t.line).forEach(pid=>seatInLine(t.line,pid))});
  if(S.draft&&S.draft.done)S.draft.teams.forEach(t=>autoSetDraftLineup(t)); /* rebuild draft lineups for new layout */
}

const RFIX={},RPRICE={},OFFS={},RST={};
(function(){

/* merge any saved data updates */
function applyDataPatch(){
  if(!S||!S.dataPatch)return;
  const P=S.dataPatch;
  if(P.maxR&&(isNaN(MAXR)||P.maxR>MAXR))MAXR=P.maxR;
  if(P.off)for(const pid in P.off)for(const r in P.off[pid]){if(!OFFS[pid])OFFS[pid]=[];OFFS[pid][r-1]=P.off[pid][r]}
  if(P.price)for(const pid in P.price)for(const r in P.price[pid]){if(!RPRICE[pid])RPRICE[pid]=[];RPRICE[pid][r-1]=P.price[pid][r]}
  if(P.fix)for(const r in P.fix)RFIX[r]=P.fix[r];
  if(P.st)for(const pid in P.st)for(const r in P.st[pid]){if(!RST[pid])RST[pid]={};RST[pid][r]=P.st[pid][r]}
}

/* ===== data update (fetch or file import) ===== */
function buildPatchFromFeeds(players,rounds){
  const idMap={};FEEDIDS.forEach((id,i)=>idMap[id]=i);
  const sqMap={};SQUAD_FEED_IDS.forEach((id,i)=>sqMap[id]=i);
  const doneRounds=rounds.filter(r=>r.status==='complete').map(r=>r.id);
  const newMax=doneRounds.length?Math.max(...doneRounds):MAXR;
  const oldMaxBefore=MAXR;/* snapshot before patch mutates MAXR */
  const P=S.dataPatch||{};P.maxR=Math.max(newMax,P.maxR||0);
  P.off=P.off||{};P.price=P.price||{};P.fix=P.fix||{};P.st=P.st||{};
  players.forEach(p=>{
    const i=idMap[p.id];if(i==null)return;
    for(let r=1;r<=newMax;r++){
      if(p.stats&&p.stats.scores&&p.stats.scores[r]!=null){(P.off[i]=P.off[i]||{})[r]=p.stats.scores[r]}
      if(p.stats&&p.stats.prices&&p.stats.prices[r]!=null){(P.price[i]=P.price[i]||{})[r]=Math.round(p.stats.prices[r]/1000)}
    }
  });
  rounds.forEach(rd=>{
    P.fix[rd.id]={byes:(rd.bye_squads||[]).map(x=>sqMap[x]).filter(x=>x!=null),
      games:(rd.matches||[]).map(m=>[sqMap[m.home_squad_id],sqMap[m.away_squad_id],m.status==='complete'?m.home_score:null,m.status==='complete'?m.away_score:null])};
  });
  S.dataPatch=P;applyDataPatch();const _adv=autoAdvanceRounds(oldMaxBefore);save();return _adv;
}
async function updateData(){
  const btn=$('#btn-update');if(btn){btn.disabled=true;btn.textContent='Updating…'}
  try{
    const _loc=location.hostname==='localhost'||location.hostname==='127.0.0.1';
    const players=await fetch(_loc?'https://fantasy.nrl.com/data/nrl/players.json':'/api/players').then(r=>r.json());
    const rounds=await fetch(_loc?'https://fantasy.nrl.com/data/nrl/rounds.json':'/api/rounds').then(r=>r.json());
    const oldMax=MAXR;
    buildPatchFromFeeds(players,rounds);
    /* try to fetch detailed stat lines for new rounds (for custom scoring + breakdowns) */
    if(MAXR>oldMax){
      const idMap={};FEEDIDS.forEach((id,i)=>idMap[id]=i);
      const ORDER=STAT_KEYS.concat(['TOG']);
      const todo=players.filter(p=>idMap[p.id]!=null&&p.stats&&p.stats.scores&&Object.keys(p.stats.scores).some(r=>+r>oldMax));
      let done=0;
      for(const p of todo){
        try{
          const j=await fetch('https://fantasy.nrl.com/data/nrl/stats/players/'+p.id+'.json').then(r=>r.json());
          const i=idMap[p.id];
          for(const k in j){const r=+k;if(!(r>oldMax&&r<=MAXR))continue;
            (S.dataPatch.st[i]=S.dataPatch.st[i]||{})[r]=ORDER.map(o=>j[k][o]||0);
          }
        }catch(e){}
        done++;if(btn&&done%25===0)btn.textContent='Updating… '+done+'/'+todo.length;
      }
      applyDataPatch();save();
    }
    const newRounds=Object.keys(S.season.rounds).length;const msg=MAXR>14?('Data updated — real results through Round '+MAXR+(newRounds>0?'. Round '+S.round+' is your next upcoming round.':'.')):'Data is current — real results loaded through Round '+MAXR+'.';alert(msg);
  }catch(e){
    openModal(`<h3>Couldn't fetch automatically</h3>
    <p class="muted" style="margin:10px 0">Your browser blocked the request (CORS). Do it manually — takes 30 seconds:</p>
    <ol style="margin:0 0 12px 18px;line-height:1.7;font-size:13px">
      <li>Scores update automatically — no manual steps needed in the live app</li>
      <li>To force a refresh, use the button above</li>
      <li>Pick both files below</li>
    </ol>
    <input type="file" id="upd-files" multiple accept=".json">
    <button class="btn" style="margin-left:8px" onclick="importDataFiles()">Import</button>
    <p class="tooltip">Manual import loads official scores, prices and fixtures. (Detailed stat lines for new rounds need the auto-update; scores still work fine.)</p>`);
  }
  if(btn){btn.disabled=false;btn.textContent='⟳ Update data from NRL Fantasy'}
  renderAll();
}
async function importDataFiles(){
  const files=[...($('#upd-files').files||[])];
  if(files.length<2){alert('Select both players.json and rounds.json');return}
  let players=null,rounds=null;
  for(const f of files){
    const j=JSON.parse(await f.text());
    if(Array.isArray(j)&&j.length&&j[0].matches!==undefined)rounds=j;else players=j;
  }
  if(!players||!rounds){alert('Could not recognise the files — need players.json and rounds.json');return}
  buildPatchFromFeeds(players,rounds);
  closeModal();alert('Imported — real results loaded through Round '+MAXR+'.');autoRefresh();
}

    const alreadyIn=new Set(resolved.map(x=>x.pid));
    const extras=line.bench.filter(x=>x!=null&&playedIn(x,r)&&!alreadyIn.has(x))
      .sort((a,b)=>(playerPts(b,r)||0)-(playerPts(a,r)||0));
    if(extras.length)resolved.push({pid:extras[0],origPid:extras[0],posId:0,slot:'bench_ins',sub:false});
  }
  /* determine captain logic */
  let capPid=null,splitVcPid=null;
  if(active.splitCaptain){
    // each of C and VC gets 1+(captainMult-1)/2 instead of one player getting captainMult
    capPid=line.c!=null&&playedIn(line.c,r)?line.c:null;
    splitVcPid=line.vc!=null&&playedIn(line.vc,r)?line.vc:null;
  } else if(active.posCaptain){
    // best scorer at chosen position gets full captain mult
    const pos=active.posCaptain.pos||1;
    let bestPts=-Infinity;
    for(const sc of resolved){
      if(sc.posId===pos){const pts=playerPts(sc.pid,r)||0;if(pts>bestPts){bestPts=pts;capPid=sc.pid;}}
    }
  } else if(active.vcLock){
    // VC only activates if captain scored under threshold
    const thr=active.vcLock.threshold!=null?active.vcLock.threshold:30;
    if(line.c!=null&&playedIn(line.c,r)){
      const capRaw=playerPts(line.c,r)||0;
      capPid=(capRaw<thr&&line.vc!=null&&playedIn(line.vc,r))?line.vc:line.c;
    } else {
      capPid=line.vc!=null&&playedIn(line.vc,r)?line.vc:null;
    }
  } else {
    capPid=line.c!=null&&playedIn(line.c,r)?line.c:(line.vc!=null&&playedIn(line.vc,r)?line.vc:null);
  }
  const splitMult=1+(captainMult-1)/2;
  /* score each player */
  for(const sc of resolved){
    let rawPts=playerPts(sc.pid,r)||0;
    rawPts=Math.round(rawPts*consistencyMult(sc.pid,r));
    let pts=rawPts,isCap=false;
    if(active.splitCaptain){
      if(sc.pid===capPid||sc.pid===splitVcPid){pts=Math.round(rawPts*splitMult);isCap=true;}
    } else if(sc.pid===capPid){
      pts=Math.round(rawPts*captainMult);isCap=true;
    }
    pts+=bonusPts(sc.pid,r)+upsetBonus(sc.pid,r);
    total+=pts;
    detail.push({pid:sc.pid,orig:sc.origPid,pts,sub:sc.sub,cap:isCap,benchIns:sc.slot==='bench_ins'});
  }
  return {total,detail};
}

/* draft lineup: starters only + autosub from bench */
function draftScore(team,r){
  if(!S.season.rounds[r])return 0;
  let total=0;
  const benchAvail=team.line.bench.filter(x=>x!=null&&playedIn(x,r)).sort((a,b)=>(playerPts(b,r)||0)-(playerPts(a,r)||0));
  const subUsed=new Set();
  for(const [posId,]of FIELD_STRUCT){
    for(let pid of team.line.starters[posId]){
      if(pid==null)continue;
      if(!playedIn(pid,r)){
        const rep=benchAvail.find(x=>!subUsed.has(x)&&PLAYERS[x].pos.includes(posId));
        if(rep!=null){subUsed.add(rep);pid=rep}else continue;
      }
      total+=playerPts(pid,r);
    }
  }
  return total;
}

/* ---------- auto-pick a valid classic squad ---------- */
function autoPickSquad(rng,quality=1){
  const cap=S.settings.cap;
  const minP=230000;
  let budget=cap;const taken=new Set();const line=emptyLine();const squad=[];
  const pool=PLAYERS.slice().sort((a,b)=>targetAvg(b)-targetAvg(a));
  const slots=[];
  for(const [posId,n]of FIELD_STRUCT)for(let i=0;i<n;i++)slots.push({posId,i,kind:'st'});
  for(let i=0;i<BENCH_N;i++)slots.push({posId:0,i,kind:'bench'});
  for(let i=0;i<RES_N;i++)slots.push({posId:0,i,kind:'res'});
  slots.forEach((slot,idx)=>{
    const left=slots.length-idx-1;
    const maxSpend=budget-left*minP;
    let cands=pool.filter(p=>!taken.has(p.id)&&price(p.id)<=maxSpend&&(slot.posId===0||p.pos.includes(slot.posId)));
    if(slot.kind==='res')cands=cands.filter(p=>price(p.id)<=Math.max(minP+60000,maxSpend*.12)).length?cands.filter(p=>price(p.id)<=Math.max(minP+60000,maxSpend*.12)):cands;
    if(!cands.length)cands=pool.filter(p=>!taken.has(p.id)&&price(p.id)<=maxSpend&&(slot.posId===0||p.pos.includes(slot.posId)));
    if(!cands.length)cands=pool.filter(p=>!taken.has(p.id)&&(slot.posId===0||p.pos.includes(slot.posId)));
    const k=Math.min(cands.length,slot.kind==='st'?Math.max(2,Math.round(6/quality)):14);
    const pick=cands[Math.floor(rng()*k)];
    taken.add(pick.id);budget-=price(pick.id);squad.push(pick.id);
    if(slot.kind==='st')line.starters[slot.posId][slot.i]=pick.id;
    else if(slot.kind==='bench')line.bench[slot.i]=pick.id;
    else line.res[slot.i]=pick.id;
  });
  const starters=[];for(const[posId,]of FIELD_STRUCT)starters.push(...line.starters[posId]);
  starters.sort((a,b)=>targetAvg(PLAYERS[b])-targetAvg(PLAYERS[a]));
  line.c=starters[0];line.vc=starters[1];
  return {squad,line};
}

/* ---------- advance to next real round ---------- */
function simulateRound(){
  const r=S.round;
  if(r>MAXR){
    alert('Round '+r+' hasn\'t been played in real life yet (results loaded through Round '+MAXR+').\n\nUse "Update data" in Rules & Settings once the round is complete.');
    return;
  }
  S.season.rounds[r]={fix:RFIX[r].games,byes:RFIX[r].byes,real:true};
  S.classic.history[r]=JSON.parse(JSON.stringify(S.classic.line));
  if(S.league){
    S.league.history=S.league.history||{};
    S.league.history[r]=S.league.teams.map(t=>JSON.parse(JSON.stringify(t.line)));
  }
  if(S.draft&&S.draft.done){
    S.draft.teams.forEach(t=>{if(t.ai)autoSetDraftLineup(t)});
    S.draft.history=S.draft.history||{};
    S.draft.history[r]=S.draft.teams.map(t=>JSON.parse(JSON.stringify(t.line)));
  }
  S.classic.tradesRound=0;
  if(S.customLeague)S.customLeague.tradesRound=0;
  /* clear round-only chips after each round */
  const ch=S.classic.chips;
  if(ch&&ch.active){for(const id of Object.keys(ch.active)){if(CHIP_DEFS[id]&&CHIP_DEFS[id].roundOnly)delete ch.active[id];}}
  /* clear expired waivers — players become FA after 1 round */
  if(S.draft&&S.draft.waivers)S.draft.waivers=S.draft.waivers.filter(w=>w.round>=r);
  /* price history snapshot */
  const ph={};PLAYERS.forEach(p=>ph[p.id]=price(p.id));
  S.priceHistory[r]=ph;
  S.round=r+1;
  S.ui.mcRound=r;
  save();renderAll();
}

/* ── auto-advance all rounds with real data (called after data update) ── */
function autoAdvanceRounds(oldMax){
  if(isNaN(oldMax)||oldMax==null)oldMax=0;/* treat NaN/null as "start from scratch" */
  const newMax=MAXR;
  if(newMax<=oldMax)return 0;
  let advanced=0;
  for(let r=oldMax+1;r<=newMax;r++){
    if(!RFIX[r])continue;
    /* mark this round as real */
    S.season.rounds[r]={fix:RFIX[r].games,byes:RFIX[r].byes,real:true};
    /* lock classic lineup into history for this round (if team exists and not already locked) */
    if(S.classic.squad.length>0&&!S.classic.history[r]){
      if(S.league)S.league.teams[0].line=JSON.parse(JSON.stringify(S.classic.line));
      S.classic.history[r]=JSON.parse(JSON.stringify(S.classic.line));
    }
    /* league history */
    if(S.league){S.league.history=S.league.history||{};
      if(!S.league.history[r])S.league.history[r]=S.league.teams.map(t=>JSON.parse(JSON.stringify(t.line)));}
    /* draft history */
    if(S.draft&&S.draft.done){
      S.draft.teams.forEach(t=>{if(t.ai)autoSetDraftLineup(t);});
      S.draft.history=S.draft.history||{};
      if(!S.draft.history[r])S.draft.history[r]=S.draft.teams.map(t=>JSON.parse(JSON.stringify(t.line)));
    }
    /* reset per-round counters */
    S.classic.tradesRound=0;
    if(S.customLeague)S.customLeague.tradesRound=0;
    /* expire round-only chips */
    const ch=S.classic.chips;
    if(ch&&ch.active){for(const id of Object.keys(ch.active)){if(CHIP_DEFS[id]&&CHIP_DEFS[id].roundOnly)delete ch.active[id];}}
    /* expire waivers */
    if(S.draft&&S.draft.waivers)S.draft.waivers=S.draft.waivers.filter(w=>w.round>=r);
    /* price history snapshot */
    const ph={};PLAYERS.forEach(p=>ph[p.id]=price(p.id));
    S.priceHistory[r]=ph;
    advanced++;
  }
  /* always keep S.round at MAXR+1 */
  S.round=MAXR+1;
  if(advanced>0)S.ui.mcRound=newMax;
  return advanced;
}

/* league ladder from history (recomputed under current rules) */
function leagueLadder(lg,isDraft){
  const teams=lg.teams.map((t,i)=>({i,name:t.name,w:0,l:0,d:0,pf:0,pa:0,pts:0}));
  const maxR=Math.min(S.round-1,24);
  const sp=(!isDraft&&S.settings.scoringPeriod)||1; /* scoring period length in rounds */
  const teamScore=(ti,r)=>isDraft?draftScoreSnap(lg,ti,r):lineupScore(lg.history[r]&&lg.history[r][ti],r).total;
  if(sp<=1){
    /* standard: one matchup per round */
    for(let r=1;r<=maxR;r++){
      if(!S.season.rounds[r]||!lg.history||!lg.history[r])continue;
      const fx=leagueFixtures(lg.teams.length,r);
      for(const[a,b]of fx){
        const sa=teamScore(a,r),sb=teamScore(b,r);
        teams[a].pf+=sa;teams[a].pa+=sb;teams[b].pf+=sb;teams[b].pa+=sa;
        if(sa>sb){teams[a].w++;teams[a].pts+=2;teams[b].l++}
        else if(sb>sa){teams[b].w++;teams[b].pts+=2;teams[a].l++}
        else{teams[a].d++;teams[b].d++;teams[a].pts++;teams[b].pts++}
      }
    }
  }else{
    /* grouped: accumulate sp rounds, one matchup per group */
    for(let start=1;start<=maxR;start+=sp){
      const end=Math.min(start+sp-1,maxR);
      /* check any round in this period has data */
      let hasData=false;
      for(let r=start;r<=end;r++)if(S.season.rounds[r]&&lg.history&&lg.history[r]){hasData=true;break;}
      if(!hasData)continue;
      const fx=leagueFixtures(lg.teams.length,start);
      for(const[a,b]of fx){
        let sa=0,sb=0;
        for(let r=start;r<=end;r++){
          if(!S.season.rounds[r]||!lg.history||!lg.history[r])continue;
          sa+=teamScore(a,r);sb+=teamScore(b,r);
        }
        teams[a].pf+=sa;teams[a].pa+=sb;teams[b].pf+=sb;teams[b].pa+=sa;
        if(sa>sb){teams[a].w++;teams[a].pts+=2;teams[b].l++}
        else if(sb>sa){teams[b].w++;teams[b].pts+=2;teams[a].l++}
        else{teams[a].d++;teams[b].d++;teams[a].pts++;teams[b].pts++}
      }
    }
  }
  return teams.sort((x,y)=>y.pts-x.pts||((y.pf-y.pa)-(x.pf-x.pa)));
}
function draftScoreSnap(lg,ti,r){
  const snap=lg.history[r][ti];
  return draftScore({line:snap},r);
}
function leagueFixtures(n,r){
  const even=n%2===0,m=even?n:n+1;
  const idx=[...Array(m).keys()];
  const rr=(r-1)%(m-1);
  const rot=[0,...idx.slice(1).map((_,i)=>1+((i+rr)%(m-1)))];
  const out=[];
  for(let i=0;i<m/2;i++){
    const a=rot[i],b=rot[m-1-i];
    if(!even&&(a===m-1||b===m-1))continue;
    out.push([a,b]);
  }
  return out;
}

function autoSetDraftLineup(team){
  const line=emptyLine();line.res=[];
  const roster=team.roster.slice().sort((a,b)=>targetAvg(PLAYERS[b])-targetAvg(PLAYERS[a]));
  const used=new Set();
  for(const[posId,n]of FIELD_STRUCT){
    for(let i=0;i<n;i++){
      const pick=roster.find(pid=>!used.has(pid)&&PLAYERS[pid].pos.includes(posId));
      if(pick!=null){line.starters[posId][i]=pick;used.add(pick)}
    }
  }
  line.bench=roster.filter(pid=>!used.has(pid)).slice(0,BENCH_N);
  while(line.bench.length<BENCH_N)line.bench.push(null);
  team.line=line;
}

/* classic squad helpers */
function squadValue(){return S.classic.squad.reduce((s,pid)=>s+price(pid),0)}
function squadIds(){return new Set(S.classic.squad)}
function lineSlots(line){
  const out=[];
  for(const[posId,n]of FIELD_STRUCT)for(let i=0;i<n;i++)out.push({kind:'st',posId,i,pid:line.starters[posId][i]});
  line.bench.forEach((pid,i)=>out.push({kind:'bench',posId:0,i,pid}));
  line.res.forEach((pid,i)=>out.push({kind:'res',posId:0,i,pid}));
  return out;
}
function removeFromLine(pid){
  if(S.classic.bank!=null&&S.classic.squad.includes(pid))S.classic.bank+=price(pid);
  const L=S.classic.line;
  for(const[posId,]of FIELD_STRUCT)L.starters[posId]=L.starters[posId].map(x=>x===pid?null:x);
  L.bench=L.bench.map(x=>x===pid?null:x);
  L.res=L.res.map(x=>x===pid?null:x);
  if(L.c===pid)L.c=null;if(L.vc===pid)L.vc=null;
  S.classic.squad=S.classic.squad.filter(x=>x!==pid);
}
function addToSlot(pid,slot){
  if(S.classic.bank!=null)S.classic.bank-=price(pid);
  const L=S.classic.line;
  if(slot.kind==='st')L.starters[slot.posId][slot.i]=pid;
  else if(slot.kind==='bench')L.bench[slot.i]=pid;
  else L.res[slot.i]=pid;
  S.classic.squad.push(pid);
}
function seasonStarted(){return S.round>1}

function activateChip(id){

  if(id==='posCaptain'){

    ch.active[id]={pos:posId};

function deactivateChip(id){

}

function shareTeam(){

/* ===== AUTO-REFRESH ENGINE ===== */
let _refreshTimer=null;

function isPlayerLocked(pid){
  /* player is locked once their game has kicked off this round */
  if(LIVE.round!==S.round)return false;
  const ko=LIVE.kickoffs&&LIVE.kickoffs[pid];
  if(ko)return Date.now()>=ko;
  return livePts(pid)!==null;/* fallback: score present = game started */
}

function fmtCountdown(ms){
  if(ms<=0)return'now';
  const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000);
  return h>0?`${h}h ${m}m`:`${m}m`;
}

function updateStatusChip(){
  const el=document.getElementById('hdr-status');
  if(!el)return;
  const now=Date.now();
  if(LIVE.status==='live'){
    el.textContent='🔴 LIVE';el.style.color='var(--red)';el.style.borderColor='var(--red)';
  }else if(LIVE.firstKickoff&&LIVE.firstKickoff>now){
    const diff=LIVE.firstKickoff-now;
    el.textContent=(diff<=600000?'🔒 Locks in ':'⏱ Starts in ')+fmtCountdown(diff);
    el.style.color=diff<=600000?'var(--amber)':'var(--dim)';
    el.style.borderColor='var(--line)';
  }else if(LIVE.status==='final'){
    el.textContent='✅ Complete';el.style.color='var(--acc)';el.style.borderColor='var(--acc)';
  }else if(LIVE.status==='cors'){
    el.textContent='⚠ Offline';el.style.color='var(--dim)';el.style.borderColor='var(--line)';
  }else{
    el.textContent='';
  }
}

function scheduleNextRefresh(){
  if(_refreshTimer){clearTimeout(_refreshTimer);_refreshTimer=null;}
  const now=Date.now();
  let delay;
  if(LIVE.status==='live'){
    delay=90000;/* 90s during active round */
  }else if(LIVE.firstKickoff&&LIVE.firstKickoff>now){
    const untilKo=LIVE.firstKickoff-now;
    const untilPre=untilKo-600000;/* 10min before */
    if(untilPre>0){
      /* schedule exactly at 10min-before; also cap at 15min so we re-check regularly */
      delay=Math.min(untilPre,900000);
    }else{
      /* within 10min: check every 30s */
      delay=30000;
    }
  }else if(LIVE.status==='final'||LIVE.status==='cors'){
    delay=900000;/* 15min between rounds */
  }else{
    delay=600000;/* 10min idle */
  }
  _refreshTimer=setTimeout(()=>autoRefresh(),delay);
}

async function autoRefresh(manual){
  /* unified fetch: scores + round data + kick-off times */
  try{
  const _isLocal=location.hostname==='localhost'||location.hostname==='127.0.0.1';
    const [players,rounds]=await Promise.all([
      fetch(_isLocal?'https://fantasy.nrl.com/data/nrl/players.json':'/api/players').then(r=>r.json()),
      fetch(_isLocal?'https://fantasy.nrl.com/data/nrl/rounds.json':'/api/rounds').then(r=>r.json())
    ]);
    /* advance rounds if new data */
    buildPatchFromFeeds(players,rounds);
    /* find current/live round */
    const liveRnd=rounds.find(r=>r.status==='active')
      ||rounds.filter(r=>r.status==='complete').sort((a,b)=>b.id-a.id)[0]
      ||rounds.find(r=>r.status==='scheduled'&&r.id===S.round);
    if(!liveRnd){LIVE.status='no-data';scheduleNextRefresh();return;}
    const r=liveRnd.id;
    /* player scores */
    const idMap={};FEEDIDS.forEach((id,i)=>idMap[id]=i);
    const sc={};
    players.forEach(p=>{const i=idMap[p.id];if(i==null)return;if(p.stats?.scores?.[r]!=null)sc[i]=p.stats.scores[r];});
    /* kick-off times per player */
    const sqMap={};SQUAD_FEED_IDS.forEach((id,i)=>sqMap[id]=i);
    const kickoffs={};let firstKo=null;
    if(liveRnd.matches){
      liveRnd.matches.forEach(m=>{
        /* try common field names the NRL Fantasy API might use */
        const raw=m.start_time||m.kickoff||m.scheduled_start||m.match_time||m.date||null;
        if(!raw)return;
        const ts=new Date(raw).getTime();if(isNaN(ts))return;
        const h=sqMap[m.home_squad_id],a=sqMap[m.away_squad_id];
        PLAYERS.forEach(p=>{if(p.sq===h||p.sq===a)kickoffs[p.id]=ts;});
        if(firstKo===null||ts<firstKo)firstKo=ts;
      });
    }
    LIVE={round:r,scores:sc,fetched:Date.now(),
      status:liveRnd.status==='active'?'live':'final',
      kickoffs,firstKickoff:firstKo};
  }catch(e){
    if(LIVE.status!=='live'&&LIVE.status!=='final')LIVE.status='cors';
  }
  scheduleNextRefresh();
  updateStatusChip();
  if(S.ui.page==='match')renderMatch();
  else renderAll();
}

/* legacy alias so any onclick="fetchLiveScores(this)" calls still work */
async function fetchLiveScores(btnEl){
  if(btnEl){btnEl.disabled=true;btnEl.textContent='⟳ Fetching…';}
  await autoRefresh(true);
  if(btnEl){btnEl.disabled=false;btnEl.textContent='⟳ Refresh';}
}
function livePts(pid){return LIVE.scores[pid]??null;}
function liveTeamScore(line){
  /* score the lineup using LIVE scores instead of stored official scores */
  if(!line)return 0;
  const chips=getChips();const active=chips.active||{};
  const captainMult=S.settings.captainMult||2;
  let total=0;
  const benchAvail=(line.res||[]).filter(x=>x!=null&&livePts(x)!=null).sort((a,b)=>(livePts(b)||0)-(livePts(a)||0));
  const subUsed=new Set();
  for(const[posId,]of FIELD_STRUCT){for(const pid of (line.starters[posId]||[])){
    if(pid==null)continue;
    let ap=pid;
    if(livePts(pid)==null){const rep=benchAvail.find(x=>!subUsed.has(x)&&PLAYERS[x].pos.includes(posId));if(rep!=null){subUsed.add(rep);ap=rep;}else continue;}
    let pts=livePts(ap)||0;
    if(ap===(line.c!=null&&livePts(line.c)!=null?line.c:(line.vc!=null&&livePts(line.vc)!=null?line.vc:null)))pts=Math.round(pts*captainMult);
    total+=pts;
  }}
  return total;
}

/* ===== DRAFT TIMER ===== */
let _draftTimerID=null;
const DRAFT_PICK_SECS=60;
function startPickTimer(){
  stopPickTimer();
  S.ui.draftTimerSecs=DRAFT_PICK_SECS;
  /* update UI every second */
  _draftTimerID=setInterval(()=>{
    S.ui.draftTimerSecs=Math.max(0,(S.ui.draftTimerSecs||DRAFT_PICK_SECS)-1);
    const el=document.getElementById('draft-timer');
    if(el){el.textContent=S.ui.draftTimerSecs;el.className='draft-timer-num'+(S.ui.draftTimerSecs<=15?' urgent':'');}
    const prog=document.querySelector('.draft-timer-bar progress');
    if(prog)prog.value=S.ui.draftTimerSecs;
    if(S.ui.draftTimerSecs<=0){
      stopPickTimer();
      /* auto-pick best available player */
      const D=S.draft;
      if(!D||D.phase!=='draft')return;
      const ti=draftPickOrder(D.pickNo);
      if(D.teams[ti].ai)return;
      const taken=draftTaken();
      const me=D.teams[D.me];
      const need=rosterNeeds(me);
      let pool=PLAYERS.filter(p=>!taken.has(p.id));
      const needTotal=Object.values(need).reduce((a,b)=>a+b,0);
      const picksLeft=DRAFT_ROSTER-me.roster.length;
      if(needTotal>=picksLeft)pool=pool.filter(p=>p.pos.some(x=>need[x]>0));
      pool.sort((a,b)=>targetAvg(b)-targetAvg(a));
      if(pool.length>0){myDraftPick(pool[0].id);}
    }
  },1000);
}
function stopPickTimer(){
  if(_draftTimerID){clearInterval(_draftTimerID);_draftTimerID=null;}
}

function classicMatchupHTML(){
  const lg=S.league;
  if(!lg)return `<div class="card" style="text-align:center;padding:40px 20px">

  </div>`;
  const myI=0,ladder=leagueLadder(lg,false);
  const nextR=Math.min(S.round,24),lastR=S.round-1;
  const myFx=leagueFixtures(lg.teams.length,nextR).find(([a,b])=>a===myI||b===myI);
  const oppI=myFx?(myFx[0]===myI?myFx[1]:myFx[0]):null;
  let lastHTML='';
  if(lastR>=1&&lg.history&&lg.history[lastR]){
    const mf=leagueFixtures(lg.teams.length,lastR).find(([a,b])=>a===myI||b===myI);
    if(mf){
      const opI=mf[0]===myI?mf[1]:mf[0];
      const myS=lineupScore(lg.history[lastR][myI],lastR).total;
      const opS=lineupScore(lg.history[lastR][opI],lastR).total;
      const win=myS>=opS;
      lastHTML=`<div class="card" style="margin-bottom:14px"><h3>Round ${lastR} Result</h3>

          <span style="color:var(--dim)">–</span>
          <span class="${!win?'good':'bad'}" style="font-size:26px">${opS}</span>
          <span style="flex:1">${esc(lg.teams[opI].name)}</span>
        </div>
        <div class="${win?'good':'bad'}" style="text-align:center;font-size:13px">${win?'✅ Win':'❌ Loss'}</div>
      </div>`;
    }
  }
  return lastHTML+`<div class="card"><h3>🏅 Ladder</h3>
    ${oppI!=null?`<div style="margin-bottom:10px;font-size:13px">Round ${nextR}: <b>${esc(lg.teams[myI].name)}</b> vs <b>${esc(lg.teams[oppI].name)}</b></div>`:'<div style="color:var(--dim);font-size:13px;margin-bottom:10px">Bye in Round '+nextR+'</div>'}

function applyCorrection(){
  const rEl=document.getElementById('corr-r');
  const nameEl=document.getElementById('corr-pid');
  const ptsEl=document.getElementById('corr-pts');
  if(!rEl||!nameEl||!ptsEl)return;
  const r=+rEl.value;
  const pts=+ptsEl.value;
  if(!r||isNaN(pts)){alert('Enter a valid round and score.');return;}
  /* match player name to id */
  const q=nameEl.value.toLowerCase().trim();
  const player=PLAYERS.find(p=>p.name.toLowerCase()===q)||PLAYERS.find(p=>p.name.toLowerCase().includes(q));
  if(!player){alert('Player not found: '+nameEl.value);return;}
  if(!S.corrections)S.corrections={};
  if(!S.corrections[r])S.corrections[r]={};
  S.corrections[r][player.id]=pts;
  save();renderCustom();
}

/* ===== LIVE SCORING GRADE ===== */
function scoreGrade(pid,r){
  const pts=playerPts(pid,r);
  if(pts==null)return null;
  const avg=PLAYERS[pid].avg||0;
  if(avg<=0)return pts>=50?'A+':pts>=30?'A':pts>=15?'B':'C';
  const ratio=pts/avg;
  if(ratio>=1.6)return 'A+';
  if(ratio>=1.2)return 'A';
  if(ratio>=0.85)return 'B';
  if(ratio>=0.5)return 'C';
  return 'D';
}
function gradeClass(g){
  return g==='A+'?'grade-aplus':g==='A'?'grade-a':g==='B'?'grade-b':g==='C'?'grade-c':'grade-d';
}

/* ===== BEST BALL SCORING ===== */
function bestBallScore(roster,r){
  if(!S.season.rounds[r])return {total:0,detail:[]};
  /* score every player on roster, take top STARTERS_N scorers */
  const detail=roster.map(pid=>{
    const pts=playerPts(pid,r);
    return {pid,pts:pts??0,played:pts!=null};
  }).filter(x=>x.played).sort((a,b)=>b.pts-a.pts);
  const active=detail.slice(0,STARTERS_N);
  const total=active.reduce((s,x)=>s+x.pts,0);
  return {total,detail:active};
}

function poolClick(pid){
  if(isPlayerLocked(pid)){alert(esc(PLAYERS[pid].name)+' is locked — their game has already started this round.');return;}
  let slot=S.ui.slotPick;
  if(!slot){ /* auto find a slot */

    slot=slots.find(s=>s.pid==null&&s.kind==='st'&&p.pos.includes(s.posId))||slots.find(s=>s.pid==null&&s.kind==='bench')||slots.find(s=>s.pid==null);
    if(!slot){alert('Squad full — remove a player first.');return}
  }
  const freed=slot.pid!=null?price(slot.pid):0;
  if(price(pid)-freed>S.classic.bank){alert('Not enough salary — '+fmtK(S.classic.bank+freed)+' available for this slot.');return}
  if(seasonStarted()){
    if(S.classic.tradesRound>=S.settings.tradesPerRound){alert('No trades left this round.');return}
    if(S.classic.tradesSeason>=S.settings.seasonTrades){alert('No season trades left.');return}
    S.classic.tradesRound++;S.classic.tradesSeason++;
  }
  /* if slot occupied, remove old */
  if(slot.pid!=null)removeFromLine(slot.pid);
  addToSlot(pid,slot);
  S.ui.slotPick=null;save();renderClassic();
}
function autoComplete(){
  const rng=mulberry32(Date.now()%1e9);
  /* keep current players, fill gaps */
  if(S.classic.squad.length===0){
    const {squad,line}=autoPickSquad(rng,1.4);
    S.classic.squad=squad;S.classic.line=line;
    S.classic.bank=S.settings.cap-squadValue();
  }else{
    const slots=lineSlots(S.classic.line).filter(s=>s.pid==null);
    const minP=230000;
    for(const slot of slots){
      let budget=S.classic.bank-(lineSlots(S.classic.line).filter(s=>s.pid==null).length-1)*minP;
      const ids=squadIds();
      let cands=PLAYERS.filter(p=>!ids.has(p.id)&&price(p.id)<=budget&&(slot.posId===0||p.pos.includes(slot.posId))).sort((a,b)=>targetAvg(b)-targetAvg(a));
      if(slot.kind==='res')cands.sort((a,b)=>price(a.id)-price(b.id)||targetAvg(b)-targetAvg(a)),cands=cands.filter(p=>price(p.id)<=300000).length?cands.filter(p=>price(p.id)<=300000):cands;
      if(cands.length)addToSlot(cands[Math.floor(Math.random()*Math.min(4,cands.length))].id,slot);
    }
  }
  enforceCap();
  const L=S.classic.line;
  if(L.c==null||!S.classic.squad.includes(L.c)){const st=[];for(const[pi,]of FIELD_STRUCT)st.push(...L.starters[pi]);const best=st.filter(x=>x!=null).sort((a,b)=>targetAvg(PLAYERS[b])-targetAvg(PLAYERS[a]));L.c=best[0]??null;L.vc=best[1]??null}
  save();renderClassic();
}
/* hard guarantee: downgrade players (reserves first, then bench, then starters) until under the cap */
function enforceCap(){
  let guard=0;
  while(S.classic.bank<0&&guard++<80){
    const slots=lineSlots(S.classic.line).filter(s=>s.pid!=null);
    let done=false;
    for(const kind of ['res','bench','st']){
      const sl=slots.filter(s=>s.kind===kind).sort((a,b)=>price(b.pid)-price(a.pid));
      for(const s of sl){
        const ids=squadIds();
        const cheap=PLAYERS.filter(p=>!ids.has(p.id)&&(s.kind!=='st'||p.pos.includes(s.posId))&&price(p.id)<price(s.pid))
          .sort((a,b)=>price(a.id)-price(b.id))[0];
        if(cheap){removeFromLine(s.pid);addToSlot(cheap.id,s);done=true;break}
      }
      if(done)break;
    }
    if(!done)break;
  }
}

  S.draft={phase:'lobby',league:{code,name:'League '+code,size,draftDate:null,participants,isOwner:false,allowAI:false},
    size,me:myPick,teams:null,pickNo:0,done:false,log:[],history:{}};
  S.ui.draftFlow=null;S.ui.draftLobbyTab='overview';
  save();renderDraft();
}
function draftPickOrder(pickNo){
  const n=S.draft.size,rd=Math.floor(pickNo/n),i=pickNo%n;
  return rd%2===0?i:n-1-i;
}
function draftTaken(){const t=new Set();S.draft.teams.forEach(tm=>tm.roster.forEach(x=>t.add(x)));return t}
function rosterNeeds(team){
  /* returns posId -> still needed for starters */
  const need={};for(const[pi,n]of FIELD_STRUCT)need[pi]=n;
  const flex=[];
  const roster=team.roster.slice().sort((a,b)=>targetAvg(PLAYERS[b])-targetAvg(PLAYERS[a]));
  for(const pid of roster){
    const p=PLAYERS[pid];
    const pi=p.pos.find(x=>need[x]>0);
    if(pi)need[pi]--;else flex.push(pid);
  }
  return need;
}
function aiDraftPick(team){
  const taken=draftTaken();
  const need=rosterNeeds(team);
  const picksLeft=DRAFT_ROSTER-team.roster.length;
  const needTotal=Object.values(need).reduce((a,b)=>a+b,0);
  let pool=PLAYERS.filter(p=>!taken.has(p.id));
  /* if we must fill needs, restrict */
  if(needTotal>=picksLeft)pool=pool.filter(p=>p.pos.some(x=>need[x]>0));
  pool.sort((a,b)=>targetAvg(b)-targetAvg(a));
  const k=Math.min(pool.length,3);
  return pool[Math.floor(Math.random()*k)].id;
}
function runAIPicks(){
  const D=S.draft;
  if(!D||D.done)return;
  const step=()=>{
    if(D.pickNo>=D.size*DRAFT_ROSTER){finishDraft();return}
    const ti=draftPickOrder(D.pickNo);
    const team=D.teams[ti];
    if(!team.ai){renderDraft();startPickTimer();return}
    const pid=aiDraftPick(team);
    team.roster.push(pid);
    D.log.unshift({pick:D.pickNo+1,team:ti,pid});
    D.pickNo++;
    save();renderDraft();
    setTimeout(step,60);
  };
  step();
}
function myDraftPick(pid){
  stopPickTimer();
  const D=S.draft;
  const ti=draftPickOrder(D.pickNo);
  if(D.teams[ti].ai)return;
  const team=D.teams[ti];
  const need=rosterNeeds(team);
  const picksLeft=DRAFT_ROSTER-team.roster.length;
  const needTotal=Object.values(need).reduce((a,b)=>a+b,0);
  const p=PLAYERS[pid];
  if(needTotal>=picksLeft&&!p.pos.some(x=>need[x]>0)){alert('You must fill your remaining starting positions: '+POS_IDS.filter(x=>need[x]>0).map(x=>need[x]+'× '+POSN[x]).join(', '));return}
  team.roster.push(pid);
  D.log.unshift({pick:D.pickNo+1,team:ti,pid});
  D.pickNo++;
  save();renderDraft();
  runAIPicks();
}
function finishDraft(){
  const D=S.draft;D.done=true;D.phase='done';
  D.teams.forEach(t=>fixDraftRoster(t));
  save();renderDraft();
}
/* guarantee every team can field 13 starters: swap surplus bench for free agents covering gaps */
function fixDraftRoster(team){
  autoSetDraftLineup(team);
  let guard=0;
  while(guard++<20){
    const missing=[];
    for(const[pi,n]of FIELD_STRUCT)team.line.starters[pi].forEach(x=>{if(x==null)missing.push(pi)});
    if(!missing.length)break;
    const taken=draftTaken();
    const fa=PLAYERS.filter(p=>!taken.has(p.id)&&p.pos.includes(missing[0])).sort((a,b)=>targetAvg(b)-targetAvg(a))[0];
    const dropPool=team.line.bench.filter(x=>x!=null);
    const drop=dropPool.sort((a,b)=>targetAvg(PLAYERS[a])-targetAvg(PLAYERS[b]))[0];
    if(!fa||drop==null)break;
    team.roster=team.roster.filter(x=>x!==drop);
    team.roster.push(fa.id);
    autoSetDraftLineup(team);
  }
}

function runMockAIPicks(){
  const D=S.ui.mockDraft;
  if(!D||D.done)return;
  const step=()=>{
    if(D.pickNo>=D.size*DRAFT_ROSTER){D.done=true;save();renderDraft();return}
    const ti=mockPickOrder(D);
    if(!D.teams[ti].ai){renderDraft();return}
    const taken=new Set();D.teams.forEach(tm=>tm.roster.forEach(x=>taken.add(x)));
    let pool=PLAYERS.filter(p=>!taken.has(p.id));
    const need=rosterNeeds(D.teams[ti]),picksLeft=DRAFT_ROSTER-D.teams[ti].roster.length;
    const needTotal=Object.values(need).reduce((a,b)=>a+b,0);
    if(needTotal>=picksLeft)pool=pool.filter(p=>p.pos.some(x=>need[x]>0));
    pool.sort((a,b)=>targetAvg(b)-targetAvg(a));
    const k=Math.min(pool.length,3);
    const pid=pool[Math.floor(Math.random()*k)].id;
    D.teams[ti].roster.push(pid);D.log.unshift({pick:D.pickNo+1,team:ti,pid});D.pickNo++;
    save();renderDraft();setTimeout(step,60);
  };step();
}
function mockPick(pid){
  const D=S.ui.mockDraft;
  const ti=mockPickOrder(D);if(D.teams[ti].ai)return;
  const team=D.teams[ti],need=rosterNeeds(team),picksLeft=DRAFT_ROSTER-team.roster.length;
  const needTotal=Object.values(need).reduce((a,b)=>a+b,0),p=PLAYERS[pid];
  if(needTotal>=picksLeft&&!p.pos.some(x=>need[x]>0)){alert('Must fill: '+POS_IDS.filter(x=>need[x]>0).map(x=>need[x]+'× '+POSN[x]).join(', '));return}
  team.roster.push(pid);D.log.unshift({pick:D.pickNo+1,team:ti,pid});D.pickNo++;
  save();renderDraft();runMockAIPicks();
}
function startDraftFromLobby(){
  const lg=S.draft.league,size=lg.size,myPick=S.draft.me;
  const openSlots=lg.participants.filter(p=>p.isEmpty).length;
  if(openSlots>0&&!lg.allowAI){
    alert(`${openSlots} slot${openSlots>1?'s are':' is'} still open. Either share the code so others can join, or enable "Fill empty slots with AI coaches" in ⚙ Settings.`);
    return;
  }
  const names=AI_NAMES.slice().sort(()=>Math.random()-.5);
  const teams=[];
  for(let i=0;i<size;i++){
    const p=lg.participants[i]||{};
    const fillAI=p.isEmpty&&lg.allowAI;
    if(i===myPick)teams.push({name:p.name||'My Team',roster:[],line:emptyLine(),ai:false});
    else teams.push({name:fillAI?(names.pop()||'AI Coach'):(p.name||names.pop()||'Player'),roster:[],line:emptyLine(),ai:fillAI||p.isAI});
  }
  S.draft.teams=teams;S.draft.phase='draft';S.draft.pickNo=0;S.draft.done=false;S.draft.log=[];
  save();renderDraft();runAIPicks();
}

   ${ladder.map((t,i)=>`<tr style="${t.i===D.me?'background:rgba(132,204,22,.08)':''}"><td class="ladder-pos">${i+1}</td><td><b>${esc(t.name)}</b>${t.i===D.me?' <span class="good">(you)</span>':''}</td><td>${t.w}</td><td>${t.l}</td><td>${t.d}</td><td>${t.pf}</td><td>${t.pa}</td><td><b>${t.pts}</b></td></tr>`).join('')}
   </tbody></table></div>
  <div class="card"><h3>Round ${nextR} fixtures</h3>
   ${fx.map(([a,b])=>`<div class="match"><div class="teams"><div class="t">${esc(D.teams[a].name)}</div><div class="score muted">vs</div><div class="t away">${esc(D.teams[b].name)}</div></div></div>`).join('')}
   ${finalsHTML(D,true)}
  </div></div>`;
}
function finalsHTML(lg,isDraft){
  if(S.round<=25)return '<p class="muted" style="margin-top:10px">Finals: top 4 after round 24 → semis (Rd 25), grand final (Rd 26).</p>';
  const ladder=leagueLadder(lg,isDraft);
  const top4=ladder.slice(0,4);
  let html='<h3 style="margin-top:14px">Finals series</h3>';
  const sf=r=>{
    const s1=isDraft?draftScoreSnap(lg,top4[0].i,25):lineupScore(lg.history[25]&&lg.history[25][top4[0].i],25).total;
    return s1;
  };
  if(S.season.rounds[25]&&lg.history&&lg.history[25]){
    const sc=i=>isDraft?draftScoreSnap(lg,top4[i].i,25):(lg.history[25][top4[i].i]?lineupScore(lg.history[25][top4[i].i],25).total:0);
    const a=sc(0),b=sc(3),c=sc(1),d=sc(2);
    const w1=a>=b?0:3,w2=c>=d?1:2;
    html+=`<div class="match"><div class="teams"><div class="t">${esc(lg.teams[top4[0].i].name)}</div><div class="score">${a} – ${b}</div><div class="t away">${esc(lg.teams[top4[3].i].name)}</div></div></div>
    <div class="match"><div class="teams"><div class="t">${esc(lg.teams[top4[1].i].name)}</div><div class="score">${c} – ${d}</div><div class="t away">${esc(lg.teams[top4[2].i].name)}</div></div></div>`;
    if(S.season.rounds[26]&&lg.history[26]){
      const gf=i=>isDraft?draftScoreSnap(lg,top4[i].i,26):(lg.history[26][top4[i].i]?lineupScore(lg.history[26][top4[i].i],26).total:0);
      const ga=gf(w1),gb=gf(w2);
      html+=`<div class="match" style="border-color:var(--amber)"><div class="teams"><div class="t">🏆 ${esc(lg.teams[top4[w1].i].name)}</div><div class="score">${ga} – ${gb}</div><div class="t away">${esc(lg.teams[top4[w2].i].name)} 🏆</div></div></div>
      <p class="good" style="margin-top:8px;font-weight:700">Premiers: ${esc(lg.teams[top4[ga>=gb?w1:w2].i].name)} 🏆</p>`;
    }else html+=`<p class="muted">Grand final: Round 26 — semifinal winners.</p>`;
  }else html+=`<p class="muted">Semis play in Round 25: 1v4, 2v3.</p>`;
  return html;
}
</script>
<script>
/* ================= MATCH CENTRE ================= */
function clubPts(ci,r){
  if(!S.season.rounds[r])return 0;
  let t=0;
  PLAYERS.forEach(p=>{if(p.sq===ci&&playedIn(p.id,r))t+=playerPts(p.id,r)});
  return t;
}
function clubLivePts(ci){
  /* sum live scores for all squad players of this club */
  let t=0;
  PLAYERS.forEach(p=>{if(p.sq===ci){const lp=livePts(p.id);if(lp!=null)t+=lp;}});
  return t;
}
function isLiveRound(r){return LIVE.round===r&&LIVE.status==='live';}
function mcPts(pid,r){
  /* prefer live score for live round, otherwise official */
  if(isLiveRound(r)){const lp=livePts(pid);if(lp!=null)return lp;}
  return playerPts(pid,r);
}
function mcClubPts(ci,r){
  if(isLiveRound(r)){return clubLivePts(ci);}
  return clubPts(ci,r);
}
/* Match Centre poll handled by central autoRefresh() — no separate interval needed */
function startMcPoll(){}
function stopMcPoll(){}

function renderMatch(){
  const el=$('#pg-match');
  const played=Object.keys(S.season.rounds).map(Number).sort((a,b)=>a-b);
  /* include live round + current/upcoming round if fixture exists */
  const liveR=LIVE.round>0?LIVE.round:null;
  const extraR=new Set();
  if(liveR)extraR.add(liveR);
  /* always show current round (MAXR+1) if we have fixture data for it */
  if(RFIX[S.round])extraR.add(S.round);
  const allRounds=[...new Set([...played,...extraR])].sort((a,b)=>a-b);
  if(!allRounds.length){
    el.innerHTML=`<div class="card" style="text-align:center;padding:40px"><h3 style="justify-content:center">📺 Match Centre</h3>
    <p class="muted" style="margin:10px 0">No rounds available yet.</p>
    <p class="muted" style="margin-top:8px;font-size:12px">Scores update automatically when rounds begin.</p></div>`;
    return;
  }
  /* default to live round if active, else last completed round */
  const defR=liveR||played[played.length-1]||S.round||1;
  const r=S.ui.mcRound?Math.min(Math.max(1,S.ui.mcRound),allRounds[allRounds.length-1]):defR;
  /* get fixture data: try season history first, then RFIX for upcoming/live */
  /* isLive = round is actively IN PROGRESS; 'final' rounds use playerPts from OFFS */
  const isLive=liveR===r&&LIVE.status==='live';
  const rdFix=S.season.rounds[r]?S.season.rounds[r]:(RFIX[r]?{fix:RFIX[r].games,byes:RFIX[r].byes,real:false}:null);
  if(!rdFix){S.ui.mcRound=defR;return renderMatch();}
  const mi=Math.min(S.ui.mcMatch||0,rdFix.fix.length-1);
  const [h,a]=rdFix.fix[mi];
  const hp=mcClubPts(h,r),ap=mcClubPts(a,r);
  const byes=rdFix.byes||[];
  /* start/stop live poll */
  if(isLive&&LIVE.status==='live')startMcPoll();else stopMcPoll();
  const age=isLive&&LIVE.fetched?Math.round((Date.now()-LIVE.fetched)/60000):null;
  const liveTag=isLive
    ?(LIVE.status==='live'
      ?`<span class="tag" style="background:rgba(255,60,60,.15);color:#ff6060;animation:pulse 1.5s infinite">🔴 LIVE${age!==null?' · '+age+'m ago':''}</span>`
      :`<span class="tag" style="background:rgba(0,230,118,.1);color:var(--acc)">✅ Final</span>`)
    :'';
  const lister=ci=>{
    /* for live round use LIVE scores + all players with data; for historical use played filter */
    let rows;
    if(isLive){
      rows=PLAYERS.filter(p=>p.sq===ci&&livePts(p.id)!=null)
        .map(p=>({p,pts:livePts(p.id)})).sort((x,y)=>y.pts-x.pts);
    }else{
      rows=PLAYERS.filter(p=>p.sq===ci&&playedIn(p.id,r))
        .map(p=>({p,pts:playerPts(p.id,r)})).sort((x,y)=>y.pts-x.pts);
    }
    if(!rows.length)return '<tr><td colspan="3" class="muted" style="padding:10px">No data yet</td></tr>';
    return rows.map(({p,pts})=>{
      const g=pts!=null?(()=>{const avg=p.avg||0;if(avg<=0)return pts>=50?'A+':pts>=30?'A':pts>=15?'B':'C';const rt=pts/avg;return rt>=1.6?'A+':rt>=1.2?'A':rt>=0.85?'B':rt>=0.5?'C':'D';})():null;
      const gc=g==='A+'?'grade-aplus':g==='A'?'grade-a':g==='B'?'grade-b':g==='C'?'grade-c':'grade-d';
      const sq=squadIds();const inMy=sq.has(p.id);
      return `<tr style="cursor:pointer${inMy?';background:rgba(132,204,22,.06)':''}" onclick="${isLive?'':('showStatLine('+p.id+','+r+')')}">
        <td>${avatar(p,26)}</td>
        <td><b>${esc(p.name)}</b>${inMy?'<span class="tag" style="font-size:9px;margin-left:4px;background:rgba(132,204,22,.12);color:var(--acc)">MY</span>':''}
          <br><span class="muted" style="font-size:11px">${posStr(p)}</span></td>
        <td style="text-align:right">
          ${g?`<span class="grade ${gc}">${g}</span>`:''}
          <b class="${pts>=60?'good':pts<20?'bad':''}">${pts??'—'}</b>
        </td></tr>`;
    }).join('');
  };
  el.innerHTML=`
  <div class="flex" style="margin-bottom:12px;flex-wrap:wrap;gap:8px">
    <label style="display:flex;align-items:center;gap:6px">Round
      <select onchange="S.ui.mcRound=+this.value;S.ui.mcMatch=0;renderMatch()">
        ${allRounds.map(x=>`<option value="${x}" ${x===r?'selected':''}>${x===liveR?'Round '+x+' 🔴':('Round '+x)}</option>`).join('')}
      </select>
    </label>
    ${liveTag}

    <span class="muted" style="font-size:12px">Bye: ${byes.length?byes.map(b=>CLUBS[b].s).join(', '):'—'}</span>
    <span class="spacer"></span>
    ${myRoundSummary(r,isLive)}
    ${isLive?`<span class="muted" style="font-size:11px">Auto-refreshes every 90s</span>`:''}
  </div>
  <div class="grid2">
   <div class="card">
    <h3>Round ${r} — ${isLive?'live NRL Fantasy':'real results'} <span class="tag">${isLive?'scores update each minute':'NRL score · fantasy = sum of player points'}</span></h3>
    ${rdFix.fix.map(([x,y,xs,ys],i)=>{
      const fx=mcClubPts(x,r),fy=mcClubPts(y,r);
      const nrlH=isLive?'–':(xs!=null?xs:'–');
      const nrlA=isLive?'–':(ys!=null?ys:'–');
      return `<div class="match" style="${i===mi?'border-color:var(--acc)':''}" onclick="S.ui.mcMatch=${i};renderMatch()">
        <div class="teams"><div class="t">${clubDot(x)} ${CLUBS[x].n}</div>
        <div class="score">${nrlH} – ${nrlA}</div>
        <div class="t away">${CLUBS[y].n} ${clubDot(y)}</div></div>
        <div style="text-align:center;font-size:11px;color:var(--dim);margin-top:3px">fantasy: <b>${fx}</b> – <b>${fy}</b></div>
      </div>`;
    }).join('')}
   </div>
   <div class="card">
    <h3>${CLUBS[h].n} <span style="color:var(--acc)">${hp}</span> — <span style="color:var(--acc)">${ap}</span> ${CLUBS[a].n}
      <span class="tag">fantasy pts${isLive?'':' · tap for stat line'}</span></h3>
    <div class="grid2">
      <div><table><thead><tr><th colspan="2">${CLUBS[h].n}</th><th style="text-align:right">Pts</th></tr></thead><tbody>${lister(h)}</tbody></table></div>
      <div><table><thead><tr><th colspan="2">${CLUBS[a].n}</th><th style="text-align:right">Pts</th></tr></thead><tbody>${lister(a)}</tbody></table></div>
    </div>
   </div>
  </div>`;
}
function myRoundSummary(r,isLive){
  const sr=S.classic.startRound||0;
  if(sr>0&&r<sr)return '';/* team didn't exist this round */
  if(isLive&&LIVE.round===r){
    const liveSc=liveTeamScore(S.classic.history[r]||S.classic.line);
    return `<span class="pill" style="background:var(--card2);border:1px solid var(--acc);border-radius:18px;padding:6px 14px">My score Rd ${r}: <b class="good">${liveSc}</b> <span style="color:var(--acc);font-size:11px">LIVE</span></span>`;
  }
  if(!S.classic.history[r])return '';
  const sc=lineupScore(S.classic.history[r],r);
  return `<span class="pill" style="background:var(--card2);border:1px solid var(--line);border-radius:18px;padding:6px 14px">My score Rd ${r}: <b class="good">${sc.total}</b></span>`;
}
function showStatLine(pid,r){
  const p=PLAYERS[pid],st=RST[pid]&&RST[pid][r],pts=playerPts(pid,r);
  const off=OFFS[pid]?OFFS[pid][r-1]:null;
  let rows='';
  if(st){
    rows=STAT_KEYS.map((k,i)=>{
      if(!st[i])return '';
      const v=st[i],ptsk=Math.round(v*(S.settings.rules[k]||0)*10)/10;
      return `<tr><td>${STAT_LABELS[k]}</td><td>${v}</td><td class="${ptsk>=0?'good':'bad'}">${ptsk>0?'+':''}${ptsk}</td></tr>`;
    }).join('');
    if(st[24])rows+=`<tr><td class="muted">Minutes on field</td><td class="muted">${st[24]}</td><td></td></tr>`;
  }
  openModal(`<div class="flex">${avatar(p,56)}<div><h3 style="margin:0">${esc(p.name)} — Round ${r}</h3>
   <div class="muted">${CLUBS[p.sq].n} · ${posStr(p)} · official stat line</div></div>
   <span class="spacer"></span><div class="stat"><div class="v">${pts}</div><div class="l">${S.settings.scoreMode==='custom'?'custom pts':'official pts'}</div></div></div>
   <table style="margin-top:12px"><thead><tr><th>Stat</th><th>Count</th><th>Points</th></tr></thead><tbody>${rows||'<tr><td colspan=3 class="muted">No detailed stat line available for this game.</td></tr>'}</tbody></table>
   ${st&&off!=null?`<p class="tooltip">Official NRL Fantasy score: <b>${off}</b>. Per-stat points use your current rules${S.settings.scoreMode==='custom'?'':' (display only — official mode is on)'}.</p>`:''}`);
}

/* ================= LEAGUES (CLASSIC) ================= */
/* ── leagues hub helpers ── */
function leagueRulesHTML(mode){
  const st=S.settings;
  if(mode==='classic'){
    return `<div class="settings-grid" style="margin-top:10px">
     <div class="set-item"><label>Scoring</label><b>Official NRL Fantasy</b></div>
     <div class="set-item"><label>Captain</label><b>2× multiplier</b></div>
     <div class="set-item"><label>Salary cap</label><b>$9.7M</b></div>
     <div class="set-item"><label>Trades / round</label><b>2</b></div>

    </div>`;

     <div class="set-item"><label>Interchange</label><b>${st.benchScores?'Scores':'Off'}</b></div>

     <div class="set-item"><label>Bonus events</label><b>${st.bonusEvents?'On':'Off'}</b></div>
     <div class="set-item"><label>Consistency bonus</label><b>${st.consistencyBonus?'On (×'+st.consistencyMult+' after '+st.consistencyStreak+' rounds)':'Off'}</b></div>
     <div class="set-item"><label>Upset bonus</label><b>${st.upsetBonus?'On (+'+st.upsetBonusPts+'pts ≥'+st.upsetThreshold+')':'Off'}</b></div>

     <div class="set-item"><label>Roster size</label><b>${dl.rosterSize||17} players</b></div>
     <div class="set-item"><label>Scoring</label><b>Official NRL Fantasy</b></div>
     <div class="set-item"><label>AI fill empty slots</label><b>${dl.allowAI?'Yes':'No'}</b></div>
     <div class="set-item"><label>League code</label><b style="font-family:monospace;letter-spacing:2px">${dl.code||'—'}</b></div>
    </div>`;

  return '';
}
function lgModeCard(mode,icon,title,league,createBtn){
  const status=league?'active':'open';
  const id='lgexpand-'+mode;
  return `<div class="card" style="margin-bottom:10px">
   <div class="flex" style="cursor:pointer" onclick="const d=document.getElementById('${id}');d.style.display=d.style.display==='none'?'block':'none'">
    <span style="font-size:22px">${icon}</span>
    <div style="flex:1">
     <div style="font-weight:700;font-size:15px">${title}${league?' — <span style="color:var(--acc);font-size:13px">'+esc(league.name||league.n||'')+'</span>':''}</div>
     <div class="muted" style="font-size:12px">${league?'Active · click to see rules':'No active league · '+createBtn}</div>
    </div>

   </div>
   <div id="${id}" style="display:none">
    <div class="navsep" style="margin:10px 0"></div>

    ${league?`<div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">

     ${mode==='custom'?`<button class="btn danger" style="font-size:12px" onclick="if(confirm('Delete league?')){S.customLeague=null;save();renderLeagues()}">Delete</button>`:''}
     ${mode==='draft'?`<button class="btn danger" style="font-size:12px" onclick="if(confirm('Delete draft league?')){S.draft=null;save();renderLeagues()}">Delete</button>`:''}
    </div>`:`<button class="btn" style="margin-top:10px" onclick="${createBtn}">Create ${title} League →</button>`}
   </div>
  </div>`;
}
function renderLeagues(){
  const el=$('#pg-leagues');
  const classicLg=S.league?{name:S.league.name}:null;
  const customLg=S.customLeague||null;
  const draftLg=(S.draft&&S.draft.league)?S.draft.league:null;
  /* ── If classic league is active, also show ladder below hub ── */
  let ladderHTML='';
  if(S.league){
    const lg=S.league;
    const ladder=leagueLadder(lg,false);
    const nextR=Math.min(S.round,24);
    const fx=leagueFixtures(lg.teams.length,nextR);
    const myFx=fx.find(([a,b])=>a===0||b===0);
    const oppI=myFx?(myFx[0]===0?myFx[1]:myFx[0]):null;
    let lastHTML='';
    const r=S.round-1;
    if(r>=1&&lg.history&&lg.history[r]){
      const fxl=leagueFixtures(lg.teams.length,r);
      const mf=fxl.find(([a,b])=>a===0||b===0);
      if(mf){
        const op=mf[0]===0?mf[1]:mf[0];
        const myS=lineupScore(lg.history[r][0],r).total,opS=lineupScore(lg.history[r][op],r).total;
        lastHTML=`<div class="notice">Round ${r}: <b>${esc(lg.teams[0].name)} ${myS}</b> ${myS>opS?'<span class="good">def.</span>':myS<opS?'<span class="bad">lost to</span>':'drew with'} <b>${esc(lg.teams[op].name)} ${opS}</b></div>`;
      }
    }
    ladderHTML=`
    <h3 style="font-size:16px;margin:20px 0 12px">Classic League — ${esc(lg.name)}</h3>

    <div class="grid2">
     <div class="card"><h3>Ladder</h3>
      <table><thead><tr><th>#</th><th>Team</th><th>W</th><th>L</th><th>D</th><th>PF</th><th>PA</th><th>Pts</th></tr></thead><tbody>
      ${ladder.map((t,i)=>`<tr style="${t.i===0?'background:rgba(0,230,118,.07)':''}"><td class="ladder-pos">${i+1}</td><td><b>${esc(t.name)}</b>${t.i===0?' <span class="good">(you)</span>':''}</td><td>${t.w}</td><td>${t.l}</td><td>${t.d}</td><td>${t.pf}</td><td>${t.pa}</td><td><b>${t.pts}</b></td></tr>`).join('')}
      </tbody></table>
      ${finalsHTML(lg,false)}
     </div>
     <div>
      <div class="card"><h3>Round ${nextR} fixtures</h3>
       ${fx.map(([a,b])=>`<div class="match"><div class="teams"><div class="t">${esc(lg.teams[a].name)}${a===0?' <span class="good">(you)</span>':''}</div><div class="score muted">vs</div><div class="t away">${b===0?'<span class="good">(you)</span> ':''}${esc(lg.teams[b].name)}</div></div></div>`).join('')}
      </div>
      ${oppI!=null?`<div class="card"><h3>Scout: ${esc(lg.teams[oppI].name)}</h3>
       <p class="muted" style="margin-bottom:8px">Projected score: <b>${Math.round(projLineup(lg.teams[oppI].line))}</b> · Your projection: <b>${Math.round(projLineup(S.classic.line))}</b></p>
       ${lineSlots(lg.teams[oppI].line).filter(s=>s.kind!=='res'&&s.pid!=null).map(s=>{const p=PLAYERS[s.pid];return `<div class="flex" style="padding:3px 0;border-bottom:1px solid var(--line)">${avatar(p,24)} ${esc(p.name)} <span class="muted">${posStr(p)}</span><span class="spacer"></span>avg ${p.avg||'–'}</div>`}).join('')}
      </div>`:''}
     </div>
    </div>`;
  }
  el.innerHTML=`
  <h3 style="font-size:18px;margin-bottom:4px">🏆 Leagues</h3>
  <p class="muted" style="font-size:13px;margin-bottom:16px">Click any league to see its scoring rules and settings. Create leagues from each game mode tab.</p>
  ${lgModeCard('classic','🏆','Classic',classicLg,'showCreateClassicLeagueModal()')}
  ${lgModeCard('custom','⚙️','Custom',customLg,'setPage(\'custom\')')}
  ${lgModeCard('draft','📋','Draft',draftLg?{name:draftLg.name||('Draft · '+draftLg.size+' teams')}:null,'setPage(\'draft\')')}
  ${ladderHTML}`;
}
function projLineup(line){
  let t=0;

<script>

/* stats computed from real results up to the app's current round */
function seasonStats(pid){
  const upto=Math.min(S.round-1,MAXR);
  const sc=[];
  for(let r=1;r<=upto;r++)if(playedIn(pid,r))sc.push(playerPts(pid,r));
  if(!sc.length){const p=PLAYERS[pid];return {gp:p.gp,avg:p.avg,l3:p.l3,l5:p.avg,hi:p.hi,lo:p.lo,feed:true}}
  const sum=a=>a.reduce((x,y)=>x+y,0);
  const last=n=>sc.slice(-n);
  return {gp:sc.length,avg:Math.round(sum(sc)/sc.length*10)/10,
    l3:Math.round(sum(last(3))/last(3).length*10)/10,
    l5:Math.round(sum(last(5))/last(5).length*10)/10,
    hi:Math.max(...sc),lo:Math.min(...sc),feed:false};
}
function nextBye(sq){
  for(let r=Math.max(S.round,1);r<=S.settings.totalRounds;r++)if(RFIX[r]&&RFIX[r].byes.includes(sq))return r;
  return null;
}
function byesUntil(sq,from,to){
  const out=[];for(let r=from;r<=to;r++)if(RFIX[r]&&RFIX[r].byes.includes(sq))out.push(r);
  return out;
}
/* what the team looks like in round r given current squad (byes applied, reserves cover) */
function byePlan(r){
  const byes=RFIX[r]?RFIX[r].byes:[];
  const onBye=pid=>byes.includes(PLAYERS[pid].sq);
  const L=S.classic.line;
  const resPool=L.res.filter(x=>x!=null&&!onBye(x));
  const used=new Set();
  const rows=[];let fielded=0;
  for(const[posId,n]of FIELD_STRUCT){
    for(const pid of L.starters[posId]){
      if(pid==null){rows.push({posId,pid:null,status:'empty'});continue}
      if(!onBye(pid)){fielded++;rows.push({posId,pid,status:'plays'})}
      else{
        const rep=resPool.find(x=>!used.has(x)&&PLAYERS[x].pos.includes(posId));
        if(rep!=null){used.add(rep);fielded++;rows.push({posId,pid,status:'bye',sub:rep})}
        else rows.push({posId,pid,status:'out'});
      }
    }
  }
  const benchAvail=L.bench.filter(x=>x!=null&&!onBye(x)).length;
  const myByes=S.classic.squad.filter(onBye);
  return {byes,rows,fielded,benchAvail,myByes};
}

/* ── Custom league setting accessors (fallback to S.settings for old saves) ── */
function cl(){return S.customLeague||{}}
function clCap(){return cl().cap??S.settings.cap}
function clTpr(){return cl().tradesPerRound??S.settings.tradesPerRound}
function clSts(){return cl().seasonTrades??S.settings.seasonTrades}
function clBank(){
  if(cl().bank==null&&S.customLeague){S.customLeague.bank=clCap()-squadValue();}
  return cl().bank??S.classic.bank;
}
function clCaptMult(){return cl().captainMult??S.settings.captainMult??2}
function clBenchScores(){return cl().benchScores??S.settings.benchScores}

  else if(m==='draft')renderDraft();

function tradeCentreHTML(){
  const outPid=S.ui.trOut;
  return `<div class="grid2">
   <div class="card"><h3>My squad <span class="tag">click a player to trade out</span></h3>

      const delta=price(s.pid)-basePriceR1(s.pid);

      return `<tr style="cursor:pointer;${outPid===s.pid?'background:rgba(132,204,22,.15)':''}" onclick="S.ui.trOut=${outPid===s.pid?'null':s.pid};refreshTrades()">

      <td>${fmtK(price(s.pid))}${delta?`<br><span class="${delta>0?'good':'bad'}" style="font-size:10px">${delta>0?'▲':'▼'}${fmtK(Math.abs(delta))}</span>`:''}</td>
