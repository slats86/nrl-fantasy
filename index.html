    }).join('')}
    </tbody></table></div>
   </div>
   <div class="card" id="trade-in-card">${tradeInHTML()}</div>
  </div>`;
}
function tradeInHTML(){
  const outPid=S.ui.trOut;
  if(outPid==null)return `<h3>Trade in</h3><p class="muted" style="padding:20px 4px">⬅ Select a player from your squad to see trade-in options with full stats, price difference and bye coverage.</p>
  <p class="tooltip">Tip: open the Bye Planner tab to spot rounds where you can't field 13 — then trade for players whose clubs don't share those byes.</p>`;
  const out=PLAYERS[outPid];
  const slot=lineSlots(S.classic.line).find(s=>s.pid===outPid);
  const budget=S.classic.bank+price(outPid);
  let pool=PLAYERS.filter(p=>!squadIds().has(p.id)&&(slot.posId===0||p.pos.some(x=>x===slot.posId||out.pos.includes(x)&&slot.posId===0)));
  if(slot.kind==='st')pool=pool.filter(p=>p.pos.includes(slot.posId));
  if(S.ui.trQ)pool=pool.filter(p=>p.name.toLowerCase().includes(S.ui.trQ.toLowerCase()));
  if(S.ui.trPos&&slot.posId===0)pool=pool.filter(p=>p.pos.includes(S.ui.trPos));
  pool.sort((a,b)=>seasonStats(b.id).avg-seasonStats(a.id).avg);
  return `<h3>Trade in for ${esc(out.name)} <span class="tag">${slot.kind==='st'?POSN[slot.posId]+' slot':slot.kind==='bench'?'interchange slot':'reserve slot'} · budget ${fmtK(budget)}</span>
   <button class="btn sec" style="margin-left:auto;padding:4px 10px" onclick="S.ui.trOut=null;refreshTrades()">✕</button></h3>
  <input placeholder="Search…" style="width:100%" value="${esc(S.ui.trQ||'')}" oninput="S.ui.trQ=this.value;$('#trade-in-card').innerHTML=tradeInHTML();const i=$('#trade-in-card input');i.focus();i.setSelectionRange(i.value.length,i.value.length)">
  ${slot.posId===0?`<div class="pos-filter">${[0,...POS_IDS].map(pi=>`<button class="${(S.ui.trPos||0)===pi?'on':''}" onclick="S.ui.trPos=${pi};$('#trade-in-card').innerHTML=tradeInHTML()">${pi===0?'ALL':POSN[pi]}</button>`).join('')}</div>`:''}
  <div style="overflow-x:auto;max-height:540px;overflow-y:auto">
  <table><thead><tr><th></th><th>Player</th><th>Price</th><th>Cost</th><th>Avg</th><th>L3</th><th>L5</th><th>Gms</th><th>Own%</th><th>Next bye</th></tr></thead><tbody>
  ${pool.slice(0,80).map(p=>{
    const st=seasonStats(p.id),cost=price(p.id)-price(outPid),can=price(p.id)<=budget,nb=nextBye(p.sq);
    return `<tr style="cursor:pointer;${can?'':'opacity:.4'}" onclick="${can?`execTrade(${outPid},${p.id})`:`alert('Not enough salary — budget for this slot is ${fmtK(budget)}.')`}">
    <td>${avatar(p,26)}</td>
    <td>${namedTick(p.id)}<b>${esc(p.name)}</b>${starterValue(p.id)?' 🔥':''}<br><span class="muted" style="font-size:11px">${CLUBS[p.sq].n} · ${posStr(p)}</span></td>
    <td>${fmtK(price(p.id))}</td>

    <td>${nb?`<span class="warn">Rd ${nb}</span>`:'<span class="muted">—</span>'}</td></tr>`;
  }).join('')}
  </tbody></table></div>`;
}
function execTrade(outPid,inPid){
  if(isPlayerLocked(outPid)){alert(esc(PLAYERS[outPid].name)+' is locked — their game has already started this round.');return;}
  if(isPlayerLocked(inPid)){alert(esc(PLAYERS[inPid].name)+' is locked — their game has already started this round.');return;}
  const slot=lineSlots(S.classic.line).find(s=>s.pid===outPid);
  if(!slot)return;
  const trMode=S.ui.trPage||'classic';
  const isCustomMode=trMode==='custom';
  /* use the mode-appropriate bank for the affordability check */
  const availBank=isCustomMode?clBank():S.classic.bank;
  const cost=price(inPid)-price(outPid);
  if(cost>availBank){alert('Not enough salary. Bank: '+fmtM(availBank)+', Cost: '+fmtM(cost));return}
  const injWild=!!(getChips().active||{}).injuryWildcard;
  if(seasonStarted()&&!injWild){
    if(isCustomMode){
      const tpr=clTpr(),sts=clSts();
      if((cl().tradesRound||0)>=tpr){alert('No custom league trades left this round.');return}
      if((cl().tradesSeason||0)>=sts){alert('No custom league season trades left.');return}
      if(!S.customLeague.tradesRound)S.customLeague.tradesRound=0;
      if(!S.customLeague.tradesSeason)S.customLeague.tradesSeason=0;
      S.customLeague.tradesRound++;S.customLeague.tradesSeason++;
    }else{
      if(S.classic.tradesRound>=S.settings.tradesPerRound){alert('No trades left this round. Use the Injury Wildcard chip if 3+ of your players are injured.');return}
      if(S.classic.tradesSeason>=S.settings.seasonTrades){alert('No season trades left.');return}
      S.classic.tradesRound++;S.classic.tradesSeason++;
    }
  }
  const wasC=S.classic.line.c===outPid,wasVC=S.classic.line.vc===outPid;
  removeFromLine(outPid);
  addToSlot(inPid,slot);
  if(wasC)S.classic.line.c=inPid;
  if(wasVC)S.classic.line.vc=inPid;
  /* update bank — squad is shared so update both; custom has its own separate balance */
  if(S.classic.bank!=null)S.classic.bank-=cost;
  if(S.customLeague&&S.customLeague.bank!=null)S.customLeague.bank-=cost;
  S.ui.trOut=null;
  save();refreshTrades();
}

/* ---------- bye planner / future team view ---------- */

    <div style="max-height:560px;overflow-y:auto">
    <table><thead><tr><th>Round</th><th>Clubs on bye</th><th>My players out</th><th>Starters</th><th>Bench</th><th></th></tr></thead>
    <tbody>${rowsHTML}</tbody></table></div>
   </div>
   <div class="card"><h3>Projected team — Round ${sel} <span class="tag">${bp.fielded}/13 starters · ${bp.benchAvail}/${BENCH_N} interchange</span></h3>
    ${bp.myByes.length?`<p class="warn" style="font-size:12px;margin-bottom:8px">On bye (${bp.myByes.length}): ${bp.myByes.map(pid=>esc(PLAYERS[pid].name)+' ('+CLUBS[PLAYERS[pid].sq].s+')').join(', ')}</p>`:'<p class="good" style="font-size:12px;margin-bottom:8px">No players on bye this round.</p>'}
    <table><thead><tr><th>Pos</th><th>Starter</th><th>Status</th></tr></thead><tbody>
    ${bp.rows.map(row=>{
      const pos=POSN[row.posId];
      if(row.pid==null)return `<tr><td>${pos}</td><td class="muted">empty slot</td><td class="bad">✗ unfilled</td></tr>`;
      const p=PLAYERS[row.pid];
      if(row.status==='plays')return `<tr><td>${pos}</td><td><b>${esc(p.name)}</b> <span class="muted">${CLUBS[p.sq].s}</span></td><td class="good">✓ plays</td></tr>`;
      if(row.status==='bye')return `<tr><td>${pos}</td><td><span style="text-decoration:line-through;opacity:.6">${esc(p.name)}</span> <span class="muted">${CLUBS[p.sq].s} bye</span></td><td class="warn">↷ ${esc(PLAYERS[row.sub].name)} covers</td></tr>`;
      return `<tr><td>${pos}</td><td><span style="text-decoration:line-through;opacity:.6">${esc(p.name)}</span> <span class="muted">${CLUBS[p.sq].s} bye</span></td><td class="bad">✗ no cover</td></tr>`;
    }).join('')}
    </tbody></table>
    ${bp.fielded<13?`<p class="tooltip" style="color:var(--red)">You'd field only ${bp.fielded}/13 in Round ${sel}. Trade for players from clubs not on bye: ${CLUBS.map((c,i)=>i).filter(i=>!bp.byes.includes(i)).map(i=>CLUBS[i].s).join(', ')}.</p>`:''}
   </div>
  </div>`;
}

     </td>
     <td><span class="clubb">${clubDot(p.sq)} ${CLUBS[p.sq].s}</span></td>
     <td>${p.pos.map(x=>`<span class="posb">${POSN[x]}</span>`).join('')}</td>
     <td>${fmtK(price(p.id))} ${delta?`<span class="${delta>0?'good':'bad'}" style="font-size:10px">${delta>0?'▲':'▼'}${fmtK(Math.abs(delta))}</span>`:''}</td>
     <td><b>${p.avg||'–'}</b></td><td>${p.l3||'–'}</td><td>${ppmC[p.id]!=null?ppmC[p.id].toFixed(2):'–'}</td><td>${trendIcon(t)}</td><td>${p.gp}</td><td>${p.hi}</td><td>${p.own}%</td>
     <td><button class="btn" style="padding:2px 7px;font-size:11px" onclick="event.stopPropagation();openComparison(${p.id})">⇔</button></td></tr>`;
   }).join('')}
   </tbody></table></div>
   ${list.length>200?'<p class="muted" style="margin-top:8px">Showing first 200 — refine your search.</p>':''}
  </div>`;
}
function plSort(k){
  if(S.ui.plSort===k)S.ui.plDir*=-1;else{S.ui.plSort=k;S.ui.plDir=-1}
  renderPlayers();
}
function gameLogRows(pid){
  const p=PLAYERS[pid];const out=[];
  for(let r=1;r<=MAXR;r++){
    if(!playedIn(pid,r))continue;
    const st=RST[pid]&&RST[pid][r];
    const gm=RFIX[r]&&RFIX[r].games.find(g=>g[0]===p.sq||g[1]===p.sq);
    const opp=gm?(gm[0]===p.sq?CLUBS[gm[1]].s:CLUBS[gm[0]].s):'—';
    const home=gm?gm[0]===p.sq:null;
    out.push({r,opp,home,st,pts:playerPts(pid,r)});
  }
  return out;
}
function showPlayer(pid){
  const p=PLAYERS[pid];
  const log=gameLogRows(pid);
  const delta=price(pid)-basePriceR1(pid);
  /* stat column index map into RST arrays */
  const IX={T:0,G:2,TA:4,LB:5,TCK:7,TB:8,MT:9,OFH:10,OFG:11,ER:12,MG:14,KM:15,TOG:24};
  const cols=[['Min','TOG'],['T','T'],['G','G'],['TA','TA'],['LB','LB'],['TCK','TCK'],['TB','TB'],['MT','MT'],['OFF',null],['ERR','ER'],['MG','MG'],['KM','KM']];
  const cell=(st,key)=>{
    if(!st)return '<td class="muted">–</td>';
    if(key===null)return '<td>'+((st[IX.OFH]||0)+(st[IX.OFG]||0)||'')+'</td>';
    const v=st[IX[key]]||0;return '<td>'+(v||(key==='TOG'?'–':''))+'</td>';
  };
  const tot={};let totPts=0;
  log.forEach(({st,pts})=>{totPts+=pts;if(!st)return;
    for(const k in IX)tot[k]=(tot[k]||0)+(st[IX[k]]||0);
    tot.OFF=(tot.OFF||0)+((st[IX.OFH]||0)+(st[IX.OFG]||0));});
  const gp=log.length;
  const logHTML=log.length?`<div style="overflow-x:auto"><table class="gamelog">
   <thead><tr><th>Rd</th><th>Opp</th>${cols.map(c=>'<th>'+c[0]+'</th>').join('')}<th>FPts</th></tr></thead><tbody>
   ${log.map(({r,opp,home,st,pts})=>`<tr style="cursor:pointer" onclick="closeModal();showStatLine(${pid},${r})">
     <td><b>${r}</b></td><td>${home===null?'':home?'v ':'@ '}${opp}</td>
     ${cols.map(c=>cell(st,c[1])).join('')}
     <td><b class="${pts>=60?'good':pts<20?'bad':''}">${pts}</b></td></tr>`).join('')}
   <tr class="tot"><td colspan="2">${gp} games</td>
     ${cols.map(c=>{const k=c[1]===null?'OFF':c[1];const v=tot[k]||0;
       return '<td>'+(k==='TOG'?(gp?Math.round(v/gp):0)+'/g':v)+'</td>';}).join('')}
     <td><b>${totPts}</b><br><span class="muted" style="font-weight:400">avg ${gp?Math.round(totPts/gp*10)/10:0}</span></td></tr>
   </tbody></table></div>
   <p class="tooltip">Official ${2026} stat lines · click a game for the full breakdown. Min totals shown as per-game average.</p>`
   :'<p class="muted">No games this season yet.</p>';
  /* previous seasons by position (footystatistics.com) */
  const hist=(typeof HIST!=='undefined'&&HIST[pid])||null;
  const histHTML=hist?`<div style="overflow-x:auto"><table class="gamelog">
   <thead><tr><th>Season</th><th>Position</th><th>Games</th><th>Avg Mins</th><th>Avg Fantasy</th></tr></thead><tbody>
   ${hist.map(h=>`<tr><td><b>${h[0]}</b></td><td>${HIST_POS[h[1]]||'?'}</td><td>${h[2]}</td><td>${h[3]}</td><td><b class="${h[4]>=50?'good':h[4]<25?'bad':''}">${h[4]}</b></td></tr>`).join('')}
   </tbody></table></div>
   <p class="tooltip">Previous seasons split by position played each game · data via footystatistics.com</p>`
   :'<p class="muted">No previous-season history found for this player.</p>';
  openModal(`
   <div class="flex">${avatar(p,72)}
    <div><h3 style="margin:0;font-size:19px">${esc(p.name)}</h3>
    <div class="muted">${namedTick(pid)}${CLUBS[p.sq].n} · ${posStr(p)} ${KICKERS.has(pid)?'· 🥅 goal kicker':''} ${NAMED[pid]===1?'· <span class="good">named to start</span>':NAMED[pid]===2?'· <span style="color:#38bdf8">named on bench</span>':''}</div>
    <div style="margin-top:4px"><b>${fmtK(price(pid))}</b> ${delta?`<span class="${delta>0?'good':'bad'}" style="font-size:11px">${delta>0?'▲':'▼'} ${fmtK(Math.abs(delta))} since Round 1</span>`:''}</div>
    </div></div>
   <div style="margin:12px 0">${statRow(p)}</div>
   ${(()=>{const t=trendOf(pid),ppm=ppmOf(pid),sv=starterValue(pid),sb=SB[pid];
     let out='';
     if(t)out+=`<div class="notice" style="margin-bottom:10px">${t.label==='up'?'📈 <b>Trending up</b>':t.label==='down'?'📉 <b>Trending down</b>':'➡ <b>Steady</b>'} — ${t.slope>0?'+':''}${t.slope} pts per game across ${t.n} games this season (season avg ${t.avg}, last-5 avg ${t.l5})${ppm!=null?` · <b>${ppm.toFixed(2)} pts/min</b>`:''}.</div>`;
     if(sb&&(sb[0]>=3||sb[3]>=3))out+=`<table class="gamelog" style="margin-bottom:10px"><thead><tr><th>Role (2024–26)</th><th>Games</th><th>Avg Mins</th><th>Avg Fantasy</th></tr></thead><tbody>
       ${sb[0]?`<tr><td>${NAMED[pid]===1?'✅ ':''}Starting 13</td><td>${sb[0]}</td><td>${sb[2]}</td><td class="${sb[1]>=45?'good':''}"><b>${sb[1]}</b></td></tr>`:''}
       ${sb[3]?`<tr><td>${NAMED[pid]===2?'✅ ':''}Off the bench</td><td>${sb[3]}</td><td>${sb[5]}</td><td><b>${sb[4]}</b></td></tr>`:''}
     </tbody></table>`;
     if(sv)out+=`<div class="notice" style="margin-bottom:10px">🔥 <b>Starter value:</b> named in the starting 13 this round and averages <b>${sv.sAvg}</b> when starting — +${sv.uplift} on current output.</div>`;
     return out})()}
   <h3 style="font-size:13px;margin-top:6px">2026 game log <span class="tag">every game · official stats · season total</span></h3>
   ${logHTML}
   <h3 style="font-size:13px;margin-top:14px">Previous seasons — minutes &amp; fantasy by position</h3>
   ${histHTML}`);
}
/* ================= SETTINGS ================= */
function renderSettings(){
  const el=$('#pg-settings');
  const st=S.settings;
  el.innerHTML=`
  <div class="card"><h3>Season data <span class="tag">results through Rd ${MAXR} · current round: ${S.round}</span></h3>
   <p class="muted" style="margin-bottom:10px">Prices are the official round-by-round prices. When new rounds finish, update to pull in the latest scores, stat lines, prices and results.</p>
   <div class="flex"><button class="btn" onclick="updateData()">⟳ Update data from NRL Fantasy</button></div>
  </div>
  <div class="card"><h3>Save &amp; restore</h3>
   <div class="flex">
    <button class="btn sec" onclick="exportSave()">Export save file</button>
    <button class="btn sec" onclick="$('#imp-file').click()">Import save</button>
    <input type="file" id="imp-file" style="display:none" accept=".json" onchange="importSave(this)">
    <button class="btn danger" onclick="if(confirm('Reset the ENTIRE game — teams, leagues, season history?')){localStorage.removeItem(STORE_KEY);location.reload()}">⚠ Full reset</button>
   </div>
  </div>

  <div class="card"><h3>📖 Rules &amp; features explained</h3>
  <div style="display:flex;flex-direction:column;gap:14px;margin-top:6px">

   <div style="background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px">
    <div style="font-weight:700;font-size:14px;margin-bottom:4px">🏥 Injury Wildcard</div>
    <p style="color:var(--dim);font-size:13px">A conditional chip that grants you <b>unlimited free trades</b> for a single round — but only unlocks when 3 or more of your players are on the injury list. To use it: open each injured player's card (Classic page → tap player) and click <b>Mark injured</b>. Once 3 are flagged, the chip activates in the Power Chips panel above your field. Unlike a standard wildcard it can only be used once per season and the injury condition must be met before each use.</p>
   </div>

   <div style="background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px">
    <div style="font-weight:700;font-size:14px;margin-bottom:4px">🎯 Positional Captain</div>
    <p style="color:var(--dim);font-size:13px">Normally your named captain gets the score multiplier (default 2×). With the <b>Positional Captain</b> chip active, you choose a position (e.g. HLF = halves) and the captain bonus automatically goes to whichever player in that position scores the most points that round — regardless of who you've named as captain. Great for maximising returns in a round where one position is clearly going to dominate. Uses 3 times per season by default.</p>
   </div>

   <div style="background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px">
    <div style="font-weight:700;font-size:14px;margin-bottom:4px">⚡ Split Captain</div>
    <p style="color:var(--dim);font-size:13px">Instead of doubling one player's score, the <b>Split Captain</b> chip applies a 1.5× multiplier to <em>both</em> your captain and vice-captain. If your usual captain/VC combo is: C = 80pts → 160pts and VC = 60pts, the split version gives 120 + 90 = 210 — a net win whenever the gap between C and VC is less than 50% of C's score. Useful in unpredictable rounds. 3 uses per season.</p>
   </div>

   <div style="background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px">
    <div style="font-weight:700;font-size:14px;margin-bottom:4px">🛡️ Bench Insurance</div>
    <p style="color:var(--dim);font-size:13px">Normally your interchange players only score if a starter didn't play (reserve cover). <b>Bench Insurance</b> forces your best-scoring interchange player to also count toward your total — even if all 13 starters took the field and no cover was needed. Think of it as a guaranteed extra scorer for the round. 3 uses per season.</p>
   </div>

   <div style="background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px">
    <div style="font-weight:700;font-size:14px;margin-bottom:4px">🔒 Vice Captain Lock</div>
    <p style="color:var(--dim);font-size:13px">By default your vice-captain only takes over if your captain doesn't play. With <b>VC Lock</b> you set a custom threshold (e.g. 30 points). If your captain plays but scores <em>under</em> that threshold, the captain multiplier shifts to your VC instead — giving you a safety net in rounds where your captain has a shocker. Activate the chip each round you want it in force and set the threshold accordingly.</p>
   </div>

   <div style="background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px">
    <div style="font-weight:700;font-size:14px;margin-bottom:4px">🎯 Bonus Point Events</div>
    <p style="color:var(--dim);font-size:13px">An optional scoring layer (toggle in settings above) that rewards elite stat milestones in a single game: <b>200+ run metres</b> = bonus points, <b>50+ tackles</b> = bonus points, <b>3+ try involvements</b> (tries + try assists + try saves combined) = bonus points. The bonuses stack with regular scoring and apply on top of official points. Useful for rewarding dominant individual performances that the standard scoring system only partially captures. Configure the bonus values in the Bonus point events section.</p>
   </div>

   <div style="background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px">
    <div style="font-weight:700;font-size:14px;margin-bottom:4px">📈 Consistency Bonus</div>
    <p style="color:var(--dim);font-size:13px">Rewards form streaks: if a player scores above their season average for X consecutive rounds (you configure X), their score gets a small multiplier that round (default 1.1×, i.e. +10%). The streak must be unbroken — one bad round resets it. This feature encourages picking consistent performers over boom-bust options and adds an extra dimension to captaincy decisions (a player on a long streak is worth an extra boost). Enable and configure in the Consistency bonus section.</p>
   </div>

   <div style="background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px">
    <div style="font-weight:700;font-size:14px;margin-bottom:4px">⚡ Upset Bonus</div>
    <p style="color:var(--dim);font-size:13px">If a player scores above a threshold (default 60 pts) but their club lost the real NRL match, they earn extra fantasy points. This recognises that high-scoring efforts in a losing side are often undervalued — a halfback who racked up 80 points in a loss showed elite individual form despite the team result. Enable in the Upset bonus section and configure both the points threshold and the bonus amount.</p>
   </div>

   <div style="background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px">
    <div style="font-weight:700;font-size:14px;margin-bottom:4px">🃏 Custom Chip Rules (League Commissioner)</div>
    <p style="color:var(--dim);font-size:13px">League commissioners can restrict which chips are available and how many times they can be used per season. Set any chip's uses to <b>0</b> to disable it completely for your league — it won't appear in the Power Chips panel for any manager. Set to <b>99</b> for unlimited uses. These settings apply globally to the game instance, so configure them before your league season starts. Change them in the Custom chip rules section above.</p>
   </div>

  </div></div>`;
}
function exportSave(){
  const a=document.createElement('a');
  a.href='data:application/json,'+encodeURIComponent(JSON.stringify(S));
  a.download='fantasy-footy-save.json';a.click();
}
function importSave(inp){
  const f=inp.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{try{S=JSON.parse(rd.result);save();renderAll();alert('Save imported.')}catch(e){alert('Invalid save file.')}};
  rd.readAsText(f);
}

function setLayout(k,v){
  S.settings.layout[k]=Math.max(0,Math.min(12,+v||0));
  applyLayout();
  applyLayoutToTeams();
  save();renderSettings();
}

/* ================= MODAL & NAV ================= */
function openModal(html){$('#modal').innerHTML='<button class="x" onclick="closeModal()">✕</button>'+html;$('#modal-bg').classList.add('on')}
function closeModal(){$('#modal-bg').classList.remove('on')}
$('#modal-bg').addEventListener('click',e=>{if(e.target.id==='modal-bg')closeModal()});

function setPage(pg){
  if(pg!=='match')stopMcPoll();
  S.ui.page=pg;
  $$('#sidebar-nav .navitem').forEach(b=>b.classList.toggle('on',b.dataset.pg===pg));
  $$('#bottom-tabbar .btab').forEach(b=>b.classList.toggle('on',b.dataset.pg===pg));
  $$('.page').forEach(p=>p.classList.toggle('on',p.id==='pg-'+pg));
  renderAll();save();
}
$$('#sidebar-nav .navitem, #bottom-tabbar .btab').forEach(b=>b.addEventListener('click',()=>setPage(b.dataset.pg)));

function renderAll(){
  const over=S.round>S.settings.totalRounds;
  $('#hdr-round').textContent=over?'Season complete':'Round '+S.round;
  updateStatusChip();
  const pg=S.ui.page||'classic';
  try{
    if(pg==='home')renderHome();
    else if(pg==='trades'){S.ui.page='classic';S.ui.classicTab='trades';renderClassic();}
    else if(pg==='classic')renderClassic();
    else if(pg==='custom')renderCustom();
    else if(pg==='draft')renderDraft();
    else if(pg==='match')renderMatch();
    else if(pg==='leagues')renderLeagues();
    else if(pg==='players')renderPlayers();
    else if(pg==='settings')renderSettings();
  }catch(e){
    console.error('renderAll error on page',pg,e);
    const el=document.getElementById('pg-'+pg);
    if(el)el.innerHTML=`<div class="card notice red" style="margin-top:20px">
      <b>⚠ Render error on ${pg}:</b> ${e.message}<br>
      <button class="btn sec" style="margin-top:10px" onclick="S=defaultState();save();location.reload()">Reset app state</button>
    </div>`;
  }
}

/* ================= INIT ================= */
load();
applyLayout();
applyDataPatch();
if(!isNaN(MAXR)){/* dataPatch applied — advance any rounds the load() pass missed */
  if(S.round<=MAXR)autoAdvanceRounds(S.round-1);
  if(S.round<MAXR+1)S.round=MAXR+1;
}
if(S.classic.bank==null)S.classic.bank=S.settings.cap-squadValue(); /* migrate: bank = cap - current value */
/* LOGIN DISABLED — set a guest user so the app loads directly */
if(!S.user)S.user={name:'Guest',email:'',method:'guest',initials:'G'};showApp();
setPage(S.ui.page||'classic');
</script>
