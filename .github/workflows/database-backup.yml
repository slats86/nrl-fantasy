name: Encrypted database backup

on:
  schedule:
    - cron: '17 16 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-database-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
      BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
    steps:
      - name: Validate backup configuration
        shell: bash
        run: |
          test -n "$DATABASE_URL" || { echo 'PRODUCTION_DATABASE_URL is not configured'; exit 1; }
          test -n "$BACKUP_PASSPHRASE" || { echo 'BACKUP_PASSPHRASE is not configured'; exit 1; }

      - name: Create PostgreSQL dump
        shell: bash
        run: |
          docker run --rm \
            -e DATABASE_URL="$DATABASE_URL" \
            -v "$PWD:/backup" \
            postgres:17-alpine \
            sh -c 'pg_dump --format=custom --no-owner --no-acl --file=/backup/nrl-fantasy.dump "$DATABASE_URL"'

      - name: Encrypt and verify backup
        shell: bash
        run: |
          test -s nrl-fantasy.dump
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$BACKUP_PASSPHRASE" \
            --symmetric --cipher-algo AES256 \
            --output nrl-fantasy.dump.gpg nrl-fantasy.dump
          test -s nrl-fantasy.dump.gpg
          sha256sum nrl-fantasy.dump.gpg > nrl-fantasy.dump.gpg.sha256
          rm -f nrl-fantasy.dump

      - name: Upload encrypted backup
        uses: actions/upload-artifact@v4
        with:
          name: nrl-fantasy-postgres-${{ github.run_id }}
          path: |
            nrl-fantasy.dump.gpg
            nrl-fantasy.dump.gpg.sha256
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
