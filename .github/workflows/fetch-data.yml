name: Fetch NRL Fantasy Data

on:
  schedule:
    - cron: '*/30 7-14 * * 4,5,6,0'  # Every 30min Thu-Sun during NRL hours
    - cron: '0 */4 * * *'             # Every 4h otherwise
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install playwright@latest
          npx playwright install chromium --with-deps

      - name: Fetch NRL Fantasy data via browser
        run: |
          mkdir -p public
          node << 'JSEOF'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const ctx = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
              locale: 'en-AU',
            });
            const page = await ctx.newPage();

            console.log('Fetching players.json...');
            const pRes = await page.goto('https://fantasy.nrl.com/data/nrl/players.json', { waitUntil: 'networkidle' });
            console.log('Status:', pRes.status());
            const playersText = await page.evaluate(() => document.body.innerText);
            const players = JSON.parse(playersText);
            console.log('Players:', players.length);
            require('fs').writeFileSync('public/players.json', JSON.stringify(players));

            console.log('Fetching rounds.json...');
            const rRes = await page.goto('https://fantasy.nrl.com/data/nrl/rounds.json', { waitUntil: 'networkidle' });
            console.log('Status:', rRes.status());
            const roundsText = await page.evaluate(() => document.body.innerText);
            const rounds = JSON.parse(roundsText);
            const done = rounds.filter(r => r.status === 'complete').map(r => r.id);
            console.log('Complete rounds:', done.join(', '));
            require('fs').writeFileSync('public/rounds.json', JSON.stringify(rounds));

            await browser.close();
            console.log('Done.');
          })().catch(e => { console.error(e); process.exit(1); });
          JSEOF

      - name: Commit if changed
        run: |
          git config user.name "nrl-data-bot"
          git config user.email "bot@nrl-fantasy"
          git add public/players.json public/rounds.json
          git diff --staged --quiet && echo "No changes" || (git commit -m "data: update NRL Fantasy scores" && git push)
