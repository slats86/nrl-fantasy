name: Fetch NRL Fantasy Data

on:
  schedule:
    - cron: '*/5 4-8 * * 2'         # frequent UTC trigger; Australia/Sydney guard selects 15:55-18:00 cadence across AEST/AEDT
    - cron: '*/10 3-13 * * 4,5,6,0' # active NRL match window (UTC / Australia east coast)
    - cron: '0 */4 * * *'            # pre-game, corrections and off-days
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

concurrency:
  group: nrl-data-refresh
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Apply Australia/Sydney team-list cadence guard
        id: team_news_schedule
        run: node scripts/team-news-scheduler.js

      - name: Stop an out-of-window Tuesday trigger
        if: github.event_name == 'schedule' && github.event.schedule == '*/5 4-8 * * 2' && steps.team_news_schedule.outputs.due != 'true'
        run: echo 'Sydney-time guard reports that no team-list refresh is due.'

      - name: Fetch, validate and transform official NRL data
        if: github.event_name != 'schedule' || github.event.schedule != '*/5 4-8 * * 2' || steps.team_news_schedule.outputs.due == 'true'
        run: npm run fetch:nrl-data

      - name: Audit the current round pipeline
        if: github.event_name != 'schedule' || github.event.schedule != '*/5 4-8 * * 2' || steps.team_news_schedule.outputs.due == 'true'
        run: npm run audit:round-pipeline

      - name: Prepare the dedicated refresh branch
        id: prepare
        run: |
          git config user.name "nrl-data-bot"
          git config user.email "bot@nrl-fantasy"
          git switch -C bot/nrl-data-refresh origin/main
          git add public/players.json public/rounds.json public/team-news.json index.html
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Official data is already current; no publish is needed."
            exit 0
          fi
          round="$(node -e "const r=require('./public/rounds.json');const x=r.filter(v=>['active','complete'].includes(v.status)).sort((a,b)=>b.id-a.id)[0];console.log(x.id)")"
          status="$(node -e "const r=require('./public/rounds.json');const x=r.filter(v=>['active','complete'].includes(v.status)).sort((a,b)=>b.id-a.id)[0];console.log(x.status)")"
          git commit -m "data: refresh NRL Fantasy Round ${round} (${status})"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "round=$round" >> "$GITHUB_OUTPUT"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Push refresh branch without stale lease races
        if: steps.prepare.outputs.changed == 'true'
        env:
          BRANCH: bot/nrl-data-refresh
        run: |
          remote_sha="$(git ls-remote origin "refs/heads/$BRANCH" | cut -f1)"
          if [ -n "$remote_sha" ]; then
            git push --force-with-lease="refs/heads/$BRANCH:$remote_sha" --set-upstream origin "$BRANCH"
          else
            git push --set-upstream origin "$BRANCH"
          fi

      - name: Close an obsolete no-change refresh pull request
        if: steps.prepare.outputs.changed == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr="$(gh pr list --head bot/nrl-data-refresh --base main --state open --json number --jq '.[0].number')"
          if [ -n "$pr" ]; then
            gh pr close "$pr" --comment "The official feed now matches main; this refresh PR is obsolete."
            remote_sha="$(git ls-remote origin refs/heads/bot/nrl-data-refresh | cut -f1)"
            if [ -n "$remote_sha" ]; then git push origin --delete bot/nrl-data-refresh; fi
          fi

      - name: Open or update the single refresh pull request
        if: steps.prepare.outputs.changed == 'true'
        id: pull_request
        env:
          GH_TOKEN: ${{ github.token }}
          ROUND: ${{ steps.prepare.outputs.round }}
          STATUS: ${{ steps.prepare.outputs.status }}
        run: |
          pr="$(gh pr list --head bot/nrl-data-refresh --base main --state open --json number --jq '.[0].number')"
          title="data: refresh NRL Fantasy Round ${ROUND} (${STATUS})"
          body="Automated official NRL fixture, score, price and player refresh. The workflow waits for the full CI workflow before merging."
          if [ -z "$pr" ]; then
            gh pr create --base main --head bot/nrl-data-refresh --title "$title" --body "$body"
            pr="$(gh pr list --head bot/nrl-data-refresh --base main --state open --json number --jq '.[0].number')"
          else
            gh pr edit "$pr" --title "$title" --body "$body"
          fi
          echo "number=$pr" >> "$GITHUB_OUTPUT"

      - name: Run required CI for the exact refresh commit
        if: steps.prepare.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ steps.prepare.outputs.sha }}
        run: |
          before="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          gh workflow run ci.yml --ref bot/nrl-data-refresh
          run_id=""
          for attempt in $(seq 1 20); do
            run_id="$(gh run list --workflow ci.yml --branch bot/nrl-data-refresh --event workflow_dispatch --commit "$SHA" --limit 1 --json databaseId,createdAt --jq 'map(select(.createdAt >= "'"$before"'"))[0].databaseId // empty')"
            [ -n "$run_id" ] && break
            sleep 3
          done
          if [ -z "$run_id" ]; then
            echo "The required CI run did not start for $SHA" >&2
            exit 1
          fi
          gh run watch "$run_id" --exit-status
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" \
            -f state=success -f context=test \
            -f description="Full CI passed for the exact data refresh commit" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${run_id}"

      - name: Merge only after CI succeeds
        if: steps.prepare.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ steps.pull_request.outputs.number }}
        run: gh pr merge "$PR" --merge --delete-branch
