name: CI

on:
  pull_request:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nrl_fantasy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nrl_fantasy_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Core and PostgreSQL integration tests
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/nrl_fantasy_test
          PGSSL: disable
        run: npm run check
      - name: Install browser runtime
        run: npx playwright install --with-deps chromium
      - name: Responsive browser tests
        run: npm run test:browser
      - name: Upload browser failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-${{ github.run_id }}
          path: test-results
          if-no-files-found: ignore
          retention-days: 7
